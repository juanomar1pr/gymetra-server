<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/fa.ico">
<link rel="apple-touch-icon" sizes="180x180" href="fa.png">
<link rel="mask-icon" href="fa.png" color="#0A84FF">
<title>Gymetra Admin | Control Panel</title>

<style>
:root {
    --bg: #000000;
    --surface: #1c1c1e;
    --accent: #0A84FF;
    --text-primary: #ffffff;
    --text-secondary: #8e8e93;
    --border: rgba(255, 255, 255, 0.1);
    --danger: #ff453a;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    background-color: var(--bg);
    color: var(--text-primary);
    margin: 0;
    -webkit-font-smoothing: antialiased;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 60px 20px;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    background: rgba(28, 28, 30, 0.7);
    backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 1000;
}

.brand { font-weight: 800; letter-spacing: -0.5px; font-size: 18px; }

/* LOGIN CARD */
.login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    text-align: center;
}

.title { font-size: 32px; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; }
.subtitle { color: var(--text-secondary); margin-bottom: 24px; font-size: 14px; }

.input {
    width: 100%;
    box-sizing: border-box;
    background: #2c2c2e;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    color: white;
    font-size: 16px;
    outline: none;
    margin-bottom: 16px;
    transition: 0.2s;
}

.input:focus { border-color: var(--accent); background: #3a3a3c; }

/* BUTTONS */
.btn {
    display: inline-block;
    background: var(--accent);
    color: white;
    border: none;
    padding: 14px 28px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
}

.btn:hover { opacity: 0.9; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-secondary { background: #3a3a3c; color: var(--text-primary); }
.btn-danger { background: rgba(255, 69, 58, 0.15); color: var(--danger); }
.btn-danger:hover { background: var(--danger); color: white; }

/* MEETS LIST */
.section-title { 
    font-size: 13px; 
    font-weight: 700; 
    color: var(--text-secondary); 
    text-transform: uppercase; 
    letter-spacing: 1px;
    margin-bottom: 16px;
}

.card-item {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 18px 24px;
    border-radius: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    transition: 0.2s;
}

.card-item:hover { border-color: rgba(255,255,255,0.2); }

.slug-name { font-weight: 700; font-size: 18px; color: var(--text-primary); }
.url-preview { font-size: 12px; color: var(--accent); margin-top: 4px; font-family: monospace; }

.actions { display: flex; gap: 10px; }

/* UTILS */
.hidden { display: none !important; }
.error-msg { color: var(--danger); font-size: 13px; margin-top: 12px; font-weight: 600; }
.badge { background: rgba(50, 215, 75, 0.1); color: #32D74B; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 800; }

@media (max-width: 600px) {
    .card-item { flex-direction: column; align-items: flex-start; gap: 16px; }
    .actions { width: 100%; display: grid; grid-template-columns: 1fr 1fr; }
}
</style>
</head>

<body>

<div class="navbar">
    <div class="brand">GYMETRA <span style="color:var(--accent)">ADMIN</span></div>
    <div id="authBadge" class="badge hidden">SECURE SESSION</div>
</div>

<!-- LOGIN VIEW -->
<div id="loginView" class="container">
    <div style="max-width: 420px; margin: auto;">
        <h2 class="title">Welcome Back</h2>
        <p class="subtitle">Enter your administrator credentials to manage meets.</p>
        <div class="login-card">
            <input id="password" class="input" type="password" placeholder="Admin Password" onkeypress="if(event.key==='Enter') login()">
            <button class="btn" style="width: 100%;" onclick="login()">Sign In</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>
</div>

<!-- MAIN APP VIEW -->
<div id="appView" class="container hidden">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
        <div>
            <h2 class="title" style="margin:0">Active Meets</h2>
            <p style="color: var(--text-secondary); margin: 4px 0 0 0;">Manage your live events and results.</p>
        </div>
        <button class="btn btn-secondary" onclick="logout()">Logout</button>
    </div>

    <div class="section">
        <div class="section-title">Database Overview</div>
        <div id="list" class="list">
            <!-- Meets populate here -->
        </div>
    </div>
</div>

<script>
// --- CONFIGURATION ---
const SB_BASE_URL = "https://ulexxpaatpjtpgkancew.supabase.co/rest/v1";
window.ADMIN_KEY = null; 

function login() {
    const password = document.getElementById("password").value.trim();
    const errorEl = document.getElementById("loginError");
    
    window.ADMIN_KEY = password; 

    // Test connection
    fetch(`${SB_BASE_URL}/meets?select=slug&limit=1`, {
        method: "GET",
        headers: { 
            "apikey": window.ADMIN_KEY, 
            "Authorization": `Bearer ${window.ADMIN_KEY}`
        }
    })
    .then(r => {
        if (!r.ok) throw new Error("Status: " + r.status);
        showApp();
        load();
    })
    .catch((err) => {
        console.error("Login error:", err);
        errorEl.textContent = "Invalid key. Access denied.";
    });
}

function load() {
    fetch(`${SB_BASE_URL}/meets?select=slug`, {
        headers: { 
            "apikey": window.ADMIN_KEY, 
            "Authorization": `Bearer ${window.ADMIN_KEY}` 
        }
    })
    .then(r => r.json())
    .then(data => {
        const container = document.getElementById("list");
        container.innerHTML = "";

        if (!data || data.length === 0) {
            container.innerHTML = '<div style="color:var(--text-secondary); padding: 20px;">No active meets found.</div>';
            return;
        }

        data.forEach(item => {
            const div = document.createElement("div");
            div.className = "card-item";
            div.innerHTML = `
                <div class="card-left">
                    <div class="slug-name">${item.slug}</div>
                    <div class="url-preview">/view.html?slug=${item.slug}</div>
                </div>
                <div class="actions">
                    <button class="btn btn-secondary" onclick="openMeet('${item.slug}')">Open</button>
                    <button class="btn btn-danger" onclick="deleteMeet('${item.slug}')">Delete</button>
                </div>
            `;
            container.appendChild(div);
        });
    })
    .catch(err => console.error("Loading error:", err));
}

function deleteMeet(slug) {
    if (!confirm(`Permanently delete "${slug}"? This action cannot be undone.`)) return;

    fetch(`${SB_BASE_URL}/meets?slug=eq.${slug}`, {
        method: "DELETE",
        headers: { 
            "apikey": window.ADMIN_KEY, 
            "Authorization": `Bearer ${window.ADMIN_KEY}`,
            "Content-Type": "application/json"
        }
    })
    .then(r => {
        if (!r.ok) throw new Error("Error " + r.status);
        load(); 
    })
    .catch(err => alert("Delete failed. Please check your service_role key."));
}

function openMeet(slug) {
    window.open(`https://gymetra.net/meets/view.html?slug=${slug}`, "_blank");
}
</script>

</body>
</html>
