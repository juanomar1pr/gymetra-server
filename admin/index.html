<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gymetra Admin | Control Panel</title>

<style>
:root {
    --bg: #000000;
    --surface: #1c1c1e;
    --accent: #0A84FF;
    --text-primary: #ffffff;
    --text-secondary: #8e8e93;
    --border: rgba(255, 255, 255, 0.1);
    --danger: #ff453a;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--bg); /* Corregido de --negro-metalico */
    background-image: radial-gradient(circle, #222 1px, transparent 1px);
    background-size: 30px 30px;
    color: var(--text-primary);
    min-height: 100vh;
}

/* NAVBAR - Ahora se mantiene arriba */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 24px;
    height: 64px;
    background: rgba(28, 28, 30, 0.8);
    backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--border);
    position: fixed; /* Fixed para que no se mueva al hacer scroll */
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
}

.brand { font-weight: 800; letter-spacing: -0.5px; font-size: 18px; }

/* CONTENEDOR PRINCIPAL */
.container {
    max-width: 800px;
    margin: 0 auto;
    padding: 120px 20px 60px 20px; /* Padding superior para no quedar debajo de la navbar */
}

/* LOGIN VIEW CENTRADO */
#loginView {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
}

/* LOGIN CARD */
.login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    text-align: center;
    width: 100%;
    max-width: 400px;
}

.title { font-size: 32px; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; }
.subtitle { color: var(--text-secondary); margin-bottom: 24px; font-size: 14px; }

.input {
    width: 100%;
    box-sizing: border-box;
    background: #2c2c2e;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    color: white;
    font-size: 16px;
    outline: none;
    margin-bottom: 16px;
    transition: 0.2s;
}

.input:focus { border-color: var(--accent); background: #3a3a3c; }

/* BUTTONS */
.btn {
    display: inline-block;
    background: var(--accent);
    color: white;
    border: none;
    padding: 14px 28px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    text-align: center;
}

.btn:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-secondary { background: #3a3a3c; color: var(--text-primary); }
.btn-danger { background: rgba(255, 69, 58, 0.15); color: var(--danger); }
.btn-danger:hover { background: var(--danger); color: white; }

/* MEETS LIST */
.card-item {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 18px 24px;
    border-radius: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

.slug-name { font-weight: 700; font-size: 18px; }
.url-preview { font-size: 12px; color: var(--accent); font-family: monospace; }
.actions { display: flex; gap: 10px; }

/* UTILS */
.hidden { display: none !important; }
.badge { background: rgba(50, 215, 75, 0.1); color: #32D74B; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 800; }
.error-msg { color: var(--danger); font-size: 13px; margin-top: 12px; font-weight: 600; }

@media (max-width: 600px) {
    .card-item { flex-direction: column; align-items: flex-start; gap: 16px; }
    .actions { width: 100%; display: grid; grid-template-columns: 1fr 1fr; }
}
</style>
</head>

<body>

<div class="navbar">
    <div class="brand">GYMETRA <span style="color:var(--accent)">ADMIN</span></div>
    <div id="authBadge" class="badge hidden">SECURE SESSION</div>
</div>

<div id="loginView" class="container">
    <div style="text-align: center; width: 100%;">
        <h2 class="title">Welcome Back</h2>
        <p class="subtitle">Enter administrator credentials to manage meets.</p>
        <div class="login-card" style="margin: 0 auto;">
            <input id="password" class="input" type="password" placeholder="Admin Password" onkeypress="if(event.key==='Enter') login()">
            <button class="btn" style="width: 100%;" onclick="login()">Sign In</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>
</div>

<div id="appView" class="container hidden">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
        <div>
            <h2 class="title" style="margin:0">Active Meets</h2>
            <p style="color: var(--text-secondary); margin: 4px 0 0 0;">Manage live events and results.</p>
        </div>
        <button class="btn btn-secondary" onclick="logout()">Logout</button>
    </div>

    <div class="section">
        <p style="font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px;">Database Overview</p>
        <div id="list" class="list">
            </div>
    </div>
</div>

<script>
// El resto de tu script de Supabase se mantiene igual, ya está bien estructurado.
// ... (mismo código JS de antes)
</script>

</body>
</html>
