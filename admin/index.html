<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="/fa.png?v=6" type="image/png" sizes="32x32">
<link rel="apple-touch-icon" href="/fa.png?v=6">

<title>Gymetra Admin | Control Panel</title>

<style>
:root {
    --bg: #000000;
    --surface: #1c1c1e;
    --accent: #0A84FF;
    --text-primary: #ffffff;
    --text-secondary: #8e8e93;
    --border: rgba(255, 255, 255, 0.1);
    --danger: #ff453a;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    background-color: var(--bg);
    background-image: radial-gradient(circle, #222 1px, transparent 1px);
    background-size: 30px 30px;
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 24px;
    height: 64px;
    background: rgba(28, 28, 30, 0.8);
    backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--border);
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
}

.brand {
    font-weight: 800;
    letter-spacing: -0.5px;
    font-size: 18px;
}

.container {
    max-width: 800px;
    margin: 0 auto;
    padding: 120px 20px 60px 20px;
}

#loginView {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
}

.login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    text-align: center;
    width: 100%;
    max-width: 400px;
}

.title {
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 8px;
    letter-spacing: -1px;
}

.subtitle {
    color: var(--text-secondary);
    margin-bottom: 24px;
    font-size: 14px;
}

.input {
    width: 100%;
    box-sizing: border-box;
    background: #2c2c2e;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    color: white;
    font-size: 16px;
    outline: none;
    margin-bottom: 16px;
    transition: 0.2s;
}

.input:focus {
    border-color: var(--accent);
    background: #3a3a3c;
}

.btn {
    display: inline-block;
    background: var(--accent);
    color: white;
    border: none;
    padding: 14px 28px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    text-decoration: none;
}

.btn:hover {
    opacity: 0.9;
    transform: translateY(-1px);
}

.btn-secondary {
    background: #3a3a3c;
    color: var(--text-primary);
}

.btn-danger {
    background: rgba(255, 69, 58, 0.15);
    color: var(--danger);
}

.btn-danger:hover {
    background: var(--danger);
    color: white;
}

.card-item {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 18px 24px;
    border-radius: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

.slug-name {
    font-weight: 700;
    font-size: 18px;
}

.url-preview {
    font-size: 12px;
    color: var(--accent);
    font-family: monospace;
}

.actions {
    display: flex;
    gap: 10px;
}

.hidden {
    display: none !important;
}

.error-msg {
    color: var(--danger);
    font-size: 13px;
    margin-top: 12px;
    font-weight: 600;
}

.badge {
    background: rgba(50, 215, 75, 0.1);
    color: #32D74B;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 800;
}

.notice {
    color: var(--text-secondary);
    font-size: 13px;
    margin-top: 10px;
}

@media (max-width: 600px) {
    .card-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
    }

    .actions {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
    }
}
</style>
</head>

<body>

<div class="navbar">
    <div class="brand">GYMETRA <span style="color:var(--accent)">ADMIN</span></div>
    <div id="authBadge" class="badge hidden">SECURE SESSION</div>
</div>

<div id="loginView" class="container">
    <div class="login-card">
        <h2 class="title">Welcome Back</h2>
         <p class="subtitle">Enter User for administrator</p>
        <input
    id="email"
    class="input"
    type="email"
    placeholder="Admin Email"
    onkeypress="if(event.key==='Enter') login()"
>
        <p class="subtitle">Enter administrator credentials.</p>
        <input
            id="password"
            class="input"
            type="password"
            placeholder="Admin Password"
            onkeypress="if(event.key==='Enter') login()"
        >
        <button class="btn" style="width: 100%;" onclick="login()">Sign In</button>
        <button class="btn btn-secondary" style="width: 100%; margin-top: 10px;" onclick="checkConnection()">Test Auth Connection</button>
        <div id="loginError" class="error-msg"></div>
    <div class="notice">Moderation delete is enabled via secure backend.</div>
    </div>
</div>

<div id="appView" class="container hidden">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
        <div>
            <h2 class="title" style="margin:0">Active Meets</h2>
            <p style="color: var(--text-secondary); margin: 4px 0 0 0;">Manage your live events.</p>
        </div>
        <button class="btn btn-secondary" onclick="logout()">Logout</button>
    </div>

    <div id="list" class="list"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const PUBLIC_KEY = "sb_publishable_rF-UPEX2zhC5cZztSFeGaQ_-7bjyloC";

const SB_BASE_URL = "https://ulexxpaatpjtpgkancew.supabase.co/rest/v1";

function showLogin() {
    document.getElementById("loginView").classList.remove("hidden");
    document.getElementById("appView").classList.add("hidden");
    document.getElementById("authBadge").classList.add("hidden");
    document.getElementById("loginError").textContent = "";
}

function showApp() {
    document.getElementById("loginView").classList.add("hidden");
    document.getElementById("appView").classList.remove("hidden");
    document.getElementById("authBadge").classList.remove("hidden");
}

const supabase = window.supabase.createClient(
    "https://ulexxpaatpjtpgkancew.supabase.co",
    PUBLIC_KEY
);

async function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorEl = document.getElementById("loginError");
    errorEl.textContent = "";
    console.log("Trying login with email:", email);

    if (!email || !password) {
        errorEl.textContent = "Enter your admin email and password.";
        return;
    }

    try {
        const { data, error } = await supabase.auth.signInWithPassword({
            email,
            password
        });

        if (error) {
            console.error("Supabase login error:", error);
            errorEl.textContent = error.message || "Login failed.";
            return;
        }

        if (!data.session) {
            errorEl.textContent = "Login succeeded but no session was returned.";
            return;
        }
    } catch (err) {
        console.error("Unexpected login error:", err);
        errorEl.textContent = err?.message || "Unexpected login error.";
        return;
    }

    sessionStorage.setItem("gymetra_admin", "true");

    showApp();
    load();
}

async function checkConnection() {
    const errorEl = document.getElementById("loginError");
    errorEl.textContent = "";

    try {
        const { data, error } = await supabase.auth.getSession();
        console.log("Current session check:", { data, error });
        errorEl.textContent = error ? (error.message || "Auth connection failed.") : "Auth connection OK. Check browser console for details.";
    } catch (err) {
        console.error("Auth connection check failed:", err);
        errorEl.textContent = err?.message || "Auth connection failed.";
    }
}

function load() {
    fetch(`${SB_BASE_URL}/meets?select=slug&order=slug.asc`, {
        headers: {
            apikey: PUBLIC_KEY,
            Authorization: `Bearer ${PUBLIC_KEY}`
        }
    })
    .then(async (r) => {
        if (!r.ok) {
            throw new Error(`Load failed: ${r.status}`);
        }
        return r.json();
    })
    .then((data) => {
        const container = document.getElementById("list");
        container.innerHTML = "";

        if (!Array.isArray(data) || data.length === 0) {
            container.innerHTML = '<div style="color:var(--text-secondary); padding: 20px;">No active meets found.</div>';
            return;
        }

        data.forEach((item) => {
            const slug = item.slug || "untitled";
            const div = document.createElement("div");
            div.className = "card-item";
            div.innerHTML = `
                <div class="card-left">
                    <div class="slug-name">${escapeHtml(slug)}</div>
                    <div class="url-preview">/view.html?slug=${encodeURIComponent(slug)}</div>
                </div>
                <div class="actions">
                    <button class="btn btn-secondary" onclick="openMeet('${escapeJs(slug)}')">Open</button>
                    <button class="btn btn-danger" onclick="deleteMeet('${escapeJs(slug)}')">Delete</button>
                </div>
            `;
            container.appendChild(div);
        });
    })
    .catch((err) => {
        console.error("Loading error:", err);
        document.getElementById("list").innerHTML =
            '<div style="color:var(--danger); padding: 20px;">Failed to load meets.</div>';
    });
}


function openMeet(slug) {
    window.open(`https://gymetra.net/meets/view.html?slug=${encodeURIComponent(slug)}`, "_blank");
}
async function deleteMeet(slug) {
    const {
        data: { session }
    } = await supabase.auth.getSession();

    if (!session) {
        alert("Session expired.");
        logout();
        return;
    }

    const response = await fetch(
        "https://ulexxpaatpjtpgkancew.supabase.co/functions/v1/delete-meet",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${session.access_token}`
            },
            body: JSON.stringify({ slug })
        }
    );

    const result = await response.json();

    if (!response.ok) {
        alert(result.error);
        return;
    }

    alert(`"${slug}" deleted successfully`);
    load();
}

async function logout() {
    await supabase.auth.signOut();
    sessionStorage.removeItem("gymetra_admin");
    document.getElementById("email").value = "";
    document.getElementById("password").value = "";
    showLogin();
}

function escapeHtml(value) {
    return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function escapeJs(value) {
    return String(value)
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'");
}

supabase.auth.getSession().then(({ data }) => {
    if (data.session) {
        sessionStorage.setItem("gymetra_admin", "true");
        showApp();
        load();
    } else {
        showLogin();
    }
});
</script>

</body>
</html>
