<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/fa.png?v=6" type="image/png" sizes="32x32">
<link rel="apple-touch-icon" href="/fa.png?v=6">

<title>Gymetra | Live Results</title>

<script>
const savedTheme = localStorage.getItem("theme") || "light";
document.documentElement.setAttribute("data-theme", savedTheme);
</script>

<style>
:root {
    --bg: #000;
    --surface: #111;
    --text: #fff;
    --text-dim: #8e8e93;
    --accent: #7c3aed;
    --border: #2c2c2e;
    --gold: #FFD700;
    --row-alt: #161618;
}
[data-theme="light"] {
    --bg: #f2f2f7;
    --surface: #fff;
    --text: #000;
    --text-dim: #636366;
    --accent: #7c3aed;
    --border: #d1d1d6;
    --gold: #c6a300;
    --row-alt: #f9f9f9;
}
body {
    font-family: -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    font-size: 13px;
}
.sticky-top {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
}
.header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 15px;
}
.breadcrumb {
    font-weight: 800;
    font-size: 18px;
    color: var(--text);
    text-transform: uppercase;
}
.filter-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 10px 15px;
}
.chip {
    padding: 6px 14px;
    border-radius: 999px;
    background: var(--surface);
    color: var(--text-dim);
    border: 1px solid var(--border);
    cursor: pointer;
    white-space: nowrap;
    font-weight: 700;
    flex: 0 0 auto;
}
.chip.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
}
.search-area {
    padding: 10px 15px;
}
input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    color: var(--text);
    box-sizing: border-box;
}
.table-wrapper {
    width: 100%;
    overflow-x: auto;
}
table {
    width: 100%;
    border-collapse: collapse;
}
th {
    background: var(--surface);
    color: var(--text-dim);
    padding: 14px 10px;
    text-align: left;
    font-size: 10px;
    border-bottom: 2px solid var(--border);
}
td {
    padding: 12px 10px;
    border-bottom: 1px solid var(--border);
}
tr:nth-child(even) {
    background: var(--row-alt);
}
.score-cell {
    text-align: center;
    font-weight: 700;
    font-family: monospace;
    width: 70px;
}
.score-active {
    background: rgba(124, 58, 237, 0.12);
    color: var(--text);
}
.col-aa {
    color: var(--gold);
    font-weight: 900;
}
.loading-state {
    text-align: center;
    padding: 100px;
    color: var(--text-dim);
}
.insight-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 9px;
    color: var(--text);
    cursor: pointer;
}
.insight-btn:hover {
    border-color: var(--accent);
}

@media (max-width: 700px) {
    .col-team {
        display: none;
    }

    .col-score.mobile-hidden {
        display: none;
    }

    .col-rank {
        width: 36px;
        min-width: 36px;
    }

    .col-score.mobile-priority {
        width: 72px;
        min-width: 72px;
        text-align: right;
    }

    .col-name {
        width: auto;
    }

    .score-cell {
        font-size: 16px;
        font-weight: 800;
        white-space: nowrap;
    }

    td, th {
        padding: 14px 8px;
    }
}
</style>
</head>
<body>

<div class="sticky-top">
    <div class="header-top">
        <div class="breadcrumb" id="meet-title">GYMETRA > CARGANDO...</div>
        <div onclick="toggleTheme()" style="cursor:pointer">🌓</div>
    </div>

    <div class="filter-row" id="session-filters"></div>
    <div class="filter-row" id="event-filters" style="background: var(--surface); border-top: 1px solid var(--border);"></div>

    <div class="search-area">
        <input id="search" placeholder="Search by gymnast, club, or level...">
    </div>
</div>

<div class="table-wrapper" id="content-area">
    <table>
        <thead><tr id="table-head"></tr></thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<div id="loader" class="loading-state">Conectando con Supabase...</div>

<script>
const params = new URLSearchParams(window.location.search);
const slug = params.get("slug");

const sbUrl = "https://ulexxpaatpjtpgkancew.supabase.co/rest/v1/meets";
const sbKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsZXh4cGFhdHBqdHBna2FuY2V3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTIyNDMsImV4cCI6MjA4OTYyODI0M30.gqKgykSN65QKxTWC7WwsjsUijrfNi0QviwyccZBrPkA";

let DATA = null;
let curSession = "all";
let curSortEvent = "allAround";

function toggleTheme() {
    const next = (localStorage.getItem("theme") || "dark") === "dark" ? "light" : "dark";
    localStorage.setItem("theme", next);
    document.documentElement.setAttribute("data-theme", next);
}

async function loadResults() {
    try {
        const response = await fetch(`${sbUrl}?slug=eq.${slug}&select=data`, {
            headers: {
                apikey: sbKey,
                Authorization: `Bearer ${sbKey}`
            }
        });

        if (!response.ok) {
            throw new Error(`Supabase error ${response.status}`);
        }

        const result = await response.json();

        if (result && result.length > 0) {
            DATA = result[0].data;

            document.getElementById("loader").style.display = "none";
            document.getElementById("meet-title").innerHTML = DATA.meet?.name || "GYMETRA";

            buildSessionFilters();
            buildEventFilters();
            render();
        } else {
            showError("No hay datos para este evento.");
        }
    } catch (err) {
        console.error(err);
        showError("Error de conexión con el servidor.");
    }
}

function getSessionOptions() {
    const sessions = [...new Set(
        DATA.events
            .map(e => e.session)
            .filter(Boolean)
            .filter(s => s !== "AA")
    )];

    return ["all", ...sessions];
}

function buildSessionFilters() {
    const container = document.getElementById("session-filters");
    container.innerHTML = "";

    getSessionOptions().forEach(sessionName => {
        const chip = document.createElement("div");
        chip.className = `chip ${sessionName === curSession ? "active" : ""}`;
        chip.textContent = sessionName === "all" ? "All" : sessionName;

        chip.onclick = () => {
            curSession = sessionName;
            buildSessionFilters();
            render();
        };

        container.appendChild(chip);
    });
}

function getVisibleEvents() {
    const sessionEvents = DATA.events.filter(e => {
        if (e.event === "allAround") return true;
        if (curSession === "all") return true;
        return e.session === curSession;
    });

    return [...new Set(sessionEvents.map(e => e.event))]
        .sort((a, b) => a === "allAround" ? -1 : b === "allAround" ? 1 : 0);
}

function buildEventFilters() {
    const container = document.getElementById("event-filters");
    container.innerHTML = "";

    const events = getVisibleEvents();

    if (!events.includes(curSortEvent)) {
        curSortEvent = events.includes("allAround") ? "allAround" : events[0];
    }

    events.forEach(eventName => {
        const chip = document.createElement("div");
        chip.className = `chip ${eventName === curSortEvent ? "active" : ""}`;
        chip.textContent = eventName === "allAround" ? "AA" : eventName;

        chip.onclick = () => {
            curSortEvent = eventName;
            buildEventFilters();
            render();
        };

        container.appendChild(chip);
    });
}

function render() {
    const head = document.getElementById("table-head");
    const body = document.getElementById("table-body");
    const query = document.getElementById("search").value.toLowerCase();

    const sessionEvents = DATA.events.filter(e => {
        if (e.event === "allAround") return true;
        if (curSession === "all") return true;
        return e.session === curSession;
    });

    const eventNames = [...new Set(sessionEvents.map(e => e.event))]
        .sort((a, b) => a === "allAround" ? -1 : b === "allAround" ? 1 : 0);

    head.innerHTML =
        `<th class="col-rank">Rank</th>
         <th class="col-name">Gymnast</th>
         <th class="col-team">Team</th>` +
        eventNames.map(en => {
            const mobileClass = en === curSortEvent ? "mobile-priority" : "mobile-hidden";
            return `<th class="col-score ${mobileClass}" style="text-align:center">
                ${en === "allAround" ? "AA" : en}
            </th>`;
        }).join("") +
        `<th>Insights</th>`;

    const athletes = {};

    sessionEvents.forEach(evt => {
        evt.results.forEach(res => {
            const a = res.athlete || {};
            const id = a.id || a.athleteId || `${a.firstName || ""}${a.lastName || ""}`;

            if (!athletes[id]) {
                const insightKey = String(
                    a.federationID ||
                    `${a.firstName || ""}|${a.lastName || ""}|${a.birthDate || ""}`
                ).trim().toLowerCase();

                athletes[id] = {
                    insightKey,
                    name: `${a.firstName || ""} ${a.lastName || ""}`.trim(),
                    team: a.club || "—",
                    level: a.level || "",
                    ageDivision: a.ageCategory || "",
                    scores: {}
                };
            }

            athletes[id].scores[evt.event] = Number(res.score) || 0;
        });
    });

    const list = Object.values(athletes)
        .filter(a => {
            const searchable = (
                a.name + " " +
                a.team + " " +
                a.level + " " +
                a.ageDivision
            ).toLowerCase();

            return searchable.includes(query);
        })
        .sort((a, b) => (b.scores[curSortEvent] || 0) - (a.scores[curSortEvent] || 0));

    body.innerHTML = "";

    list.forEach((a, i) => {
        const tr = document.createElement("tr");

        let html =
            `<td class="col-rank">${i + 1}</td>` +
            `<td class="col-name">
                <b>${escapeHtml(a.name)}</b><br>
                <small style="color:var(--text-dim)">
                    ${escapeHtml([a.level, a.ageDivision].filter(Boolean).join(" • "))}
                </small>
            </td>` +
            `<td class="col-team" style="color:var(--text-dim)">${escapeHtml(a.team)}</td>`;

        eventNames.forEach(en => {
            const mobileClass = en === curSortEvent ? "mobile-priority" : "mobile-hidden";
            const val = (a.scores[en] || 0).toFixed(3);

            html += `
                <td class="score-cell col-score ${mobileClass} ${en === curSortEvent ? "score-active" : ""} ${en === "allAround" ? "col-aa" : ""}">
                    ${val}
                </td>
            `;
        });

        html += `
            <td>
                <button class="insight-btn" onclick="openInsights('${encodeURIComponent(a.insightKey)}')">📈</button>
            </td>
        `;

        tr.innerHTML = html;
        body.appendChild(tr);
    });
}

function openInsights(key) {
    window.location.href = `/coach-insights.html?athlete=${key}`;
}

function showError(msg) {
    document.getElementById("loader").innerHTML = `
        <h1>Sin resultados</h1>
        <p>${msg}</p>
        <a href="index.html" style="color:var(--accent); text-decoration:none;">← Volver</a>
    `;
}

function escapeHtml(str) {
    return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

document.getElementById("search").addEventListener("input", render);
loadResults();
</script>
</body>
</html>
