<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- CORREGIDO: Rutas directas a la raíz para el favicon e iconos -->
<link rel="icon" href="/fa.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/fa.png">
<link rel="mask-icon" href="/fa.png" color="#0A84FF">

<title>Gymetra | Pro Analytics</title>
<script>
const savedTheme = localStorage.getItem("theme") || "light";
document.documentElement.setAttribute("data-theme", savedTheme);
</script>

<style>
/* Tu CSS está perfecto, no necesita cambios */
:root {
    --bg: #000000;
    --surface: #111111;
    --row-alt: #161618;
    --accent: #0A84FF;
    --text: #ffffff;
    --text-dim: #8e8e93;
    --border: #2c2c2e;
    --gold: #FFD700;
}
[data-theme="light"] {
    --bg: #f2f2f7;
    --surface: #ffffff;
    --row-alt: #f9f9f9;
    --accent: #007AFF;
    --text: #000000;
    --text-dim: #636366;
    --border: #d1d1d6;
    --gold: #c6a300;
}
/* ... (resto del CSS igual) ... */
</style>
</head>

<body>
<!-- Tu estructura HTML igual -->
<div class="sticky-top">
    <div class="header-top">
        <div class="breadcrumb" id="meet-title">GYMETRA > <span>RESULTS</span></div>
        <div class="theme-toggle" id="theme-btn" onclick="toggleTheme()">☀️</div>
    </div>
    <div class="filter-row" id="session-filters"></div>
    <div class="filter-row event-bar" id="event-filters"></div>
    <div class="search-area">
        <input id="search" placeholder="Search gymnast, team or division...">
    </div>
</div>

<div class="table-wrapper">
    <table>
        <thead><tr id="table-head"></tr></thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
const slug = new URLSearchParams(window.location.search).get("slug");
let DATA = null;
let curSession = "";
let curSortEvent = "AA";

function toggleTheme() {
    const current = localStorage.getItem("theme") || "dark";
    const next = current === "dark" ? "light" : "dark";
    localStorage.setItem("theme", next);
    document.documentElement.setAttribute("data-theme", next);
    document.getElementById("theme-btn").innerText = next === "light" ? "🌙" : "☀️";
}

/* FETCH CORREGIDO: Usando ruta absoluta desde la raíz */
fetch(/meets/${slug}/results.json?t= + Date.now())
.then(r => {
    if (!r.ok) throw new Error("Meet not found");
    return r.json();
})
.then(data => {
    DATA = data;
    document.getElementById("meet-title").innerHTML =
        `${data.meet.name} > <span id="sess-display">SESS 1</span>`;

    const sessions = [...new Set(data.events.map(e => e.session || "Session 1"))];
    curSession = sessions[0];
    const sessCont = document.getElementById("session-filters");

    sessions.forEach((s, i) => {
        const div = document.createElement("div");
        div.className = `chip ${i === 0 ? 'active' : ''}`;
        div.innerText = s;
        div.onclick = () => {
            sessCont.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
            div.classList.add("active");
            curSession = s;
            document.getElementById("sess-display").innerText = s;
            updateEventChips();
            render();
        };
        sessCont.appendChild(div);
    });

    updateEventChips();
    render();
})
.catch(err => {
    document.body.innerHTML = `<div style="padding:50px; text-align:center;"><h1>Meet not found</h1><p>The data for <b>${slug}</b> is missing or corrupted.</p><a href="/">Go back</a></div>`;
});

/* (Resto de funciones updateEventChips y render iguales) */
</script>
</body>
</html>
