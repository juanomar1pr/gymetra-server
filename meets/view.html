<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/fa.png?v=6" type="image/png" sizes="32x32">
<link rel="apple-touch-icon" href="/fa.png?v=6">

<title>Gymetra | Live Results</title>
<script>
const savedTheme = localStorage.getItem("theme") || "light";
document.documentElement.setAttribute("data-theme", savedTheme);
</script>
<style>
:root { --bg: #000; --surface: #111; --text: #fff; --text-dim: #8e8e93; --accent: #0A84FF; --border: #2c2c2e; --gold: #FFD700; --row-alt: #161618; }
[data-theme="light"] { --bg: #f2f2f7; --surface: #fff; --text: #000; --text-dim: #636366; --accent: #007AFF; --border: #d1d1d6; --gold: #c6a300; --row-alt: #f9f9f9; }
body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; font-size: 13px; }
.sticky-top { position: sticky; top: 0; z-index: 1000; background: var(--bg); border-bottom: 1px solid var(--border); }
.header-top { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; }
.breadcrumb { font-weight: 800; font-size: 18px; color: var(--text);    text-transform: uppercase;
 text-transform: uppercase; }
.breadcrumb span { color: var(--accent); }
.filter-row { display: flex; gap: 8px; overflow-x: auto; padding: 10px 15px; }
.chip { padding: 6px 14px; border-radius: 8px; background: var(--surface); color: var(--text-dim); border: 1px solid var(--border); cursor: pointer; white-space: nowrap; font-weight: 700; }
.chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.search-area { padding: 10px 15px; }
input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px; color: var(--text); box-sizing: border-box; }
.table-wrapper { width: 100%; overflow-x: auto; }
table { width: 100%; border-collapse: collapse;  }
th { background: var(--surface); color: var(--text-dim); padding: 14px 10px; text-align: left; font-size: 10px; border-bottom: 2px solid var(--border); }
td { padding: 12px 10px; border-bottom: 1px solid var(--border); }
tr:nth-child(even) { background: var(--row-alt); }
.score-cell { text-align: center; font-weight: 700; font-family: monospace; width: 70px; }
.score-active { background: rgba(10, 132, 255, 0.1); color: var(--text); }
.col-aa { color: var(--gold); font-weight: 900; }
.loading-state { text-align: center; padding: 100px; color: var(--text-dim); }
@media (max-width: 700px) {
    .col-team {
        display: none;
    }

    .col-score:not(.mobile-priority) {
        display: none;
    }

    .col-rank {
        width: 36px;
        min-width: 36px;
    }

    .col-score.mobile-priority {
        width: 72px;
        min-width: 72px;
        text-align: right;
    }

    .col-name {
        width: auto;
    }

    .score-cell {
        font-size: 16px;
        font-weight: 800;
        white-space: nowrap;
    }

    td, th {
        padding: 14px 8px;
    }
}
</style>
</head>
<body>

<div class="sticky-top">
    <div class="header-top">
        <div class="breadcrumb" id="meet-title">GYMETRA > <span>CARGANDO...</span></div>
        <div onclick="toggleTheme()" style="cursor:pointer">☀️</div>
    </div>
   
    <div class="filter-row" id="event-filters" style="background: var(--surface); border-top: 1px solid var(--border);"></div>
    <div class="search-area"><input id="search" placeholder="Buscar gimnasta, club o nivel..."></div>
</div>

<div class="table-wrapper" id="content-area">
    <table>
        <thead><tr id="table-head"></tr></thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<div id="loader" class="loading-state">Conectando con Supabase...</div>

<script>
const params = new URLSearchParams(window.location.search);
const slug = params.get("slug");

// --- CONFIGURACIÓN SUPABASE ---
const sbUrl = "https://ulexxpaatpjtpgkancew.supabase.co/rest/v1/meets";
const sbKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsZXh4cGFhdHBqdHBna2FuY2V3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTIyNDMsImV4cCI6MjA4OTYyODI0M30.gqKgykSN65QKxTWC7WwsjsUijrfNi0QviwyccZBrPkA";

let DATA = null;
let curSession = null;
let curSortEvent = null;
let MODE = "simple"; // simple | competitive | demo

function toggleTheme() {
    const next = (localStorage.getItem("theme") || "dark") === "dark" ? "light" : "dark";
    localStorage.setItem("theme", next);
    document.documentElement.setAttribute("data-theme", next);
}

// 🧠 DETECCIÓN AUTOMÁTICA
function detectMode() {
    const sessionSet = new Set(DATA.events.map(e => e.session).filter(Boolean));
    const hasMultipleSessions = sessionSet.size > 1;

    const hasRealScores = DATA.events.some(e =>
        e.results && e.results.length > 0 && e.results.some(r => Number(r.score) > 0)
    );

    if (!hasRealScores) {
        MODE = "demo";
    } else if (hasMultipleSessions) {
        MODE = "competitive";
    } else {
        MODE = "simple";
    }

    console.log("🧠 MODE:", MODE);
}
async function loadResults() {
    try {
        const response = await fetch(`${sbUrl}?slug=eq.${slug}&select=data`, {
            headers: {
                apikey: sbKey,
                Authorization: `Bearer ${sbKey}`
            }
        });

        const result = await response.json();

        if (result && result.length > 0) {
            DATA = result[0].data;

            detectMode();

            document.getElementById("loader").style.display = "none";
            document.getElementById("meet-title").innerHTML = DATA.meet.name;

            updateEventChips();
            render();

        } else {
            showError("No hay datos para este evento.");
        }

    } catch (err) {
        console.error(err);
        showError("Error de conexión con el servidor.");
    }
}

function updateEventChips() {
    const eventCont = document.getElementById("event-filters");
    eventCont.innerHTML = "";

    // ✅ usar TODOS los eventos del meet
    let evts = [...new Set(DATA.events.map(e => e.event))];

    if (!curSortEvent || !evts.includes(curSortEvent)) {
        curSortEvent = evts.find(e => e !== "allAround") || evts[0];
    }

    evts.sort((a, b) => a === "allAround" ? -1 : 1)
        .forEach(en => {
            const div = document.createElement("div");
            div.className = `chip ${en === curSortEvent ? "active" : ""}`;
            div.innerText = en === "allAround" ? "AA" : en;

            div.onclick = () => {
                curSortEvent = en;
                eventCont.querySelectorAll(".chip").forEach(c =>
                    c.classList.remove("active")
                );
                div.classList.add("active");
                render();
            };

            eventCont.appendChild(div);
        });

}

// 🧠 RENDER PRINCIPAL
function render() {
    const head = document.getElementById("table-head");
    const body = document.getElementById("table-body");
    const query = document.getElementById("search").value.toLowerCase();



   let sessionEvents = DATA.events;

   let eventNames = [...new Set(sessionEvents.map(e => e.event))]
    .sort((a, b) => a === "allAround" ? -1 : 1);

head.innerHTML =
    `<th class="col-rank">Rank</th>
     <th class="col-name">Gymnast</th>
     <th class="col-team">Team</th>` +

    eventNames.map(en =>
        `<th class="col-score ${en === curSortEvent ? "mobile-priority" : ""}" style="text-align:center">
            ${en === "allAround" ? "AA" : en}
        </th>`
    ).join('') +

    `<th>Insights</th>`;
    const athletes = {};

    sessionEvents.forEach(evt => {
        evt.results.forEach(res => {
            const a = res.athlete;
            const id = a.athleteId || (a.firstName + a.lastName);

            if (!athletes[id]) {
          const insightKey = [
    a.firstName,
    a.lastName,
    a.club,
    a.level
]
.map(v => String(v || "").trim().toLowerCase())
.join("|");
  athletes[id] = {
    insightKey,
    name: `${a.firstName} ${a.lastName}`,
    team: a.club || "—",
    scores: {},
    total: 0
};
            }

            const s = Number(res.score) || 0;
            athletes[id].scores[evt.event] = s;

           
        });
    });

   

    const list = Object.values(athletes)
        .filter(a => (a.name + a.team).toLowerCase().includes(query))
        .sort((a, b) => (b.scores[curSortEvent] || 0) - (a.scores[curSortEvent] || 0));

    body.innerHTML = "";
list.forEach((a, i) => {
    const tr = document.createElement("tr");

    let html =
        `<td class="col-rank">${i + 1}</td>` +
        `<td class="col-name"><b>${a.name}</b></td>` +
        `<td class="col-team" style="color:var(--text-dim)">${a.team}</td>`;

    // scores
    eventNames.forEach(en => {
        const val = (a.scores[en] || 0).toFixed(3);

        html += `
            <td class="score-cell col-score ${en === curSortEvent ? 'score-active mobile-priority' : ''} ${en === 'allAround' ? 'col-aa' : ''}">
                ${val}
            </td>
        `;
    });

    // one single insights button
    html += `
        <td>
          <button onclick="openInsights('${encodeURIComponent(a.insightKey)}')">📈</button>
        </td>
    `;

    tr.innerHTML = html;
    body.appendChild(tr);
});
}
  

function showError(msg) {
    document.getElementById("loader").innerHTML = `
        <h1>Sin resultados</h1>
        <p>${msg}</p>
        <a href="index.html" style="color:var(--accent); text-decoration:none;">← Volver</a>
    `;
}

document.getElementById("search").oninput = render;

loadResults();
function openInsights(athleteKey) {
    window.location.href = `coach.html?athlete=${athleteKey}`;
}
</script>
</body>
</html>
