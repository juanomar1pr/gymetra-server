<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/fa.png?v=6" type="image/png" sizes="32x32">
<link rel="apple-touch-icon" href="/fa.png?v=6">

<title>Gymetra Meets</title>
<script>
const savedTheme = localStorage.getItem("theme") || "light";
document.documentElement.setAttribute("data-theme", savedTheme);
</script>

<style>
:root {
    --bg: #000;
    --row-bg: rgba(28,28,30,0.6);
    --border: rgba(255,255,255,0.08);
    --text: #fff;
    --sub: #8e8e93;
    --accent: #8b5cf6;
    --ticker-bg: #111;
}
[data-theme="light"] {
    --bg: #f2f2f7;
    --row-bg: #ffffff;
    --border: #e5e5ea;
    --text: #000;
    --sub: #636366;
    --accent: #7c3aed;
    --ticker-bg: #e5e5ea;
}

body {
    margin: 0;
    padding-top: 40px; /* Espacio para el ticker */
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* --- ESTILO DEL TICKER (SPORT EFFECT) --- */
.ticker-wrap {
    width: 100%;
    overflow: hidden;
    background: var(--ticker-bg);
    border-bottom: 1px solid var(--border);
    height: 35px;
    display: flex;
    align-items: center;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 9999;
}

.ticker {
    display: flex;
    white-space: nowrap;
    animation: ticker 40s linear infinite;
}

.ticker:hover { animation-play-state: paused; } /* Se pausa al poner el mouse */

@keyframes ticker {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
}

.ticker__item {
    display: inline-block;
    padding: 0 40px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text);
}

.ticker__item span {
    color: var(--accent);
    margin-left: 8px;
    font-family: monospace;
    font-size: 14px;
}

.live-dot {
    height: 8px;
    width: 8px;
    background-color: #ff3b30;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
    animation: blink 1s infinite;
}

@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
}

/* --- ESTILOS ORIGINALES Y MEJORAS --- */
.hero {
    text-align: center;
    padding: 40px 20px 10px;
}

.hero h1 {
    font-size: 38px;
    font-weight: 800;
    margin: 0;
    letter-spacing: -1px;
}

.hero p {
    color: var(--sub);
    margin-top: 4px;
    font-size: 15px;
}

.controls {
    display: flex;
    justify-content: center;
    padding: 10px 20px 25px;
    max-width: 700px;
    margin: 0 auto;
}

input {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--row-bg);
    color: var(--text);
    font-size: 16px;
    outline: none;
    transition: border 0.3s;
}

input:focus {
    border-color: var(--accent);
}

.list {
    max-width: 700px;
    margin: 0 auto;
    padding-bottom: 80px;
}

.row {
    display: flex;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.2s;
}

.row:hover { background: var(--border); }

.row-content {
    display: flex;
    flex: 1;
    gap: 10px;
    align-items: center;
    overflow: hidden;
}

.name { font-weight: 600; white-space: nowrap; }
.dot { color: var(--sub); opacity: 0.5; }
.meta { color: var(--sub); font-size: 13px; white-space: nowrap; }
.arrow { color: var(--sub); margin-left: 10px; font-size: 20px; opacity: 0.5; }

/* --- MEJORAS AL LOADING (SKELETON) --- */
.loading-shimmer {
    padding: 20px;
    text-align: center;
}

.skeleton-row {
    height: 60px;
    margin-bottom: 10px;
    background: var(--row-bg);
    border-radius: 12px;
    position: relative;
    overflow: hidden;
}

.skeleton-row::after {
    content: "";
    position: absolute;
    top: 0; right: 0; bottom: 0; left: 0;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    animation: shimmer 1.5s infinite;
}

@keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}

.empty { text-align: center; padding: 60px; color: var(--sub); }
</style>
</head>

<body>

<div class="ticker-wrap">
    <div class="ticker">
        <div class="ticker__item"><span class="live-dot"></span>SARAH JENKINS <span>9.875</span></div>
        <div class="ticker__item"><span class="live-dot"></span>MARCUS RIVERA <span>14.100</span></div>
        <div class="ticker__item">UPCOMING: FLORIDA CUP <span>MAR 28</span></div>
        <div class="ticker__item"><span class="live-dot"></span>EMMA WATSON <span>9.950</span></div>
        <div class="ticker__item"><span class="live-dot"></span>CHRIS EVANS <span>13.450</span></div>
        <div class="ticker__item">TOP SCORE: L. LOPEZ <span>10.000</span></div>
        <div class="ticker__item"><span class="live-dot"></span>SARAH JENKINS <span>9.875</span></div>
        <div class="ticker__item"><span class="live-dot"></span>MARCUS RIVERA <span>14.100</span></div>
    </div>
</div>

<div class="hero">
    <h1>Gymetra</h1>
    <p>Live scoring & meet results</p>
</div>

<div class="controls">
    <input id="search" placeholder="Search meet, club, or location" autocomplete="off">
</div>

<div class="list" id="list">
    <div class="loading-shimmer">
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
        <p style="color: var(--sub); font-size: 14px;">Fetching live data...</p>
    </div>
</div>

<script>
let ALL_MEETS = [];

const SUPABASE_BASE_URL = "https://ulexxpaatpjtpgkancew.supabase.co";
const SUPABASE_URL = `${SUPABASE_BASE_URL}/rest/v1/meets`;
const SUPABASE_KEY = "sb_publishable_rF-UPEX2zhC5cZztSFeGaQ_-7bjyloC";

async function loadAllMeets() {
    const list = document.getElementById("list");
    try {
        const response = await fetch(SUPABASE_URL, {
            headers: {
                apikey: SUPABASE_KEY,
                Authorization: `Bearer ${SUPABASE_KEY}`
            }
        });
        
        if (!response.ok) throw new Error("Connection Error");
        const data = await response.json();
        
        ALL_MEETS = data.map(item => {
            const d = item.data || {};
            const meetInfo = d.meet || {};
            return {
                slug: item.slug,
                name: meetInfo.name || d.name || item.slug, 
                host: meetInfo.hostGym || meetInfo.club || d.host || "", 
                location: meetInfo.location || d.location || "",
                date: meetInfo.startDate || d.date || ""
            };
        });

        render();
    } catch (error) {
        console.error("Error:", error);
        list.innerHTML = `<div class="empty">Unable to connect to server</div>`;
    }
}

function formatDate(d) {
    if (!d) return "";
    return new Date(d).toLocaleDateString("en-US", {
        month: "short", day: "numeric"
    });
}

function render() {
    const search = document.getElementById("search").value.toLowerCase();
    const list = document.getElementById("list");
    list.innerHTML = "";

    const filtered = ALL_MEETS.filter(m =>
        (m.name + m.location + m.host).toLowerCase().includes(search)
    );

    if (filtered.length === 0) {
        list.innerHTML = `<div class="empty">No active meets found</div>`;
        return;
    }

    filtered.forEach(m => {
        const div = document.createElement("div");
        div.className = "row";
        div.innerHTML = `
            <div class="row-content">
                <span class="name">${m.name}</span>
                ${m.host ? `<span class="dot">•</span><span class="meta">${m.host}</span>` : ""}
                ${m.location ? `<span class="dot">•</span><span class="meta">${m.location}</span>` : ""}
                ${m.date ? `<span class="dot">•</span><span class="meta">${formatDate(m.date)}</span>` : ""}
            </div>
            <div class="arrow">›</div>
        `;
        div.onclick = () => { 
    window.location.href = `view.html?slug=${m.slug}&v=6`; 
};
        list.appendChild(div);
    });
}

document.getElementById("search").oninput = render;
loadAllMeets();
</script>

</body>
</html>
