<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="/fa.ico">
<link rel="apple-touch-icon" sizes="180x180" href="fa.png">
<link rel="mask-icon" href="fa.png" color="#0A84FF">
<title>Gymetra Meets</title>
<script>
const savedTheme = localStorage.getItem("theme") || "light";
document.documentElement.setAttribute("data-theme", savedTheme);
</script>
<style>
:root {
    --bg: #000;
    --row-bg: rgba(28,28,30,0.6);
    --border: rgba(255,255,255,0.08);
    --text: #fff;
    --sub: #8e8e93;
    --accent: #8b5cf6;
}
[data-theme="light"] {
    --bg: #f2f2f7;
    --row-bg: #ffffff;
    --border: #e5e5ea;
    --text: #000;
    --sub: #636366;
    --accent: #7c3aed;
}
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    background: var(--bg);
    color: var(--text);
}

.hero {
    text-align: center;
    padding: 60px 20px 20px;
}

.hero h1 {
    font-size: 34px;
    font-weight: 700;
    margin: 0;
}

.hero p {
    color: var(--sub);
    margin-top: 6px;
}

.controls {
    display: flex;
    justify-content: center;
    padding: 10px 20px 20px;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: var(--row-bg);
    color: var(--text);
    font-size: 16px;
}

.list {
    max-width: 700px;
    margin: 0 auto;
    padding-bottom: 80px;
    overflow-y: auto;
}

.row {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.2s;
}

.row:hover {
    background: var(--border);
}

.row-content {
    display: flex;
    flex: 1;
    gap: 10px;
    align-items: center;
    overflow: hidden;
}

.name {
    font-weight: 600;
    white-space: nowrap;
}

.dot {
    color: var(--sub);
}

.meta {
    color: var(--sub);
    font-size: 13px;
    white-space: nowrap;
}

.arrow {
    color: var(--sub);
    margin-left: 10px;
}

.loading, .empty {
    text-align: center;
    padding: 40px;
    color: var(--sub);
}
</style>
</head>

<body>

<div class="hero">
    <h1>Gymetra</h1>
    <p>Live scoring</p>
</div>

<div class="controls">
    <input id="search" placeholder="Search meet, club, or location">
</div>

<div class="list" id="list">
    <div class="loading">Loading...</div>
</div>

<script>
let ALL_MEETS = [];

const SUPABASE_URL = "https://ulexxpaatpjtpgkancew.supabase.co/rest/v1/meets";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsZXh4cGFhdHBqdHBna2FuY2V3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTIyNDMsImV4cCI6MjA4OTYyODI0M30.gqKgykSN65QKxTWC7WwsjsUijrfNi0QviwyccZBrPkA";

async function loadAllMeets() {
    const list = document.getElementById("list");
    try {
        const response = await fetch(SUPABASE_URL, {
            headers: { 
                'apikey': SUPABASE_KEY, 
                'Authorization': `Bearer ${SUPABASE_KEY}` 
            }
        });
        
        if (!response.ok) throw new Error("Connection Error");
        
        const data = await response.json();
        
        ALL_MEETS = data.map(item => {
            const d = item.data || {};
            const meetInfo = d.meet || {};
            
            return {
                slug: item.slug,
                name: meetInfo.name || d.name || item.slug, 
                host: meetInfo.hostGym || meetInfo.club || d.host || "", 
                location: meetInfo.location || d.location || "",
                date: meetInfo.startDate || d.date || ""
            };
        });

        render();

    } catch (error) {
        console.error("Error:", error);
        // CAMBIADO A INGLÉS
        list.innerHTML = `<div class="empty">Unable to connect to server</div>`;
    }
}

function formatDate(d) {
    if (!d) return "";
    return new Date(d).toLocaleDateString("en-US", {
        month: "short", day: "numeric"
    });
}

function render() {
    const search = document.getElementById("search").value.toLowerCase();
    const list = document.getElementById("list");
    list.innerHTML = "";

    const filtered = ALL_MEETS.filter(m =>
        (m.name + m.location + m.host).toLowerCase().includes(search)
    );

    if (filtered.length === 0) {
        // CAMBIADO A INGLÉS
        list.innerHTML = `<div class="empty">No active meets found</div>`;
        return;
    }

    filtered.forEach(m => {
        const div = document.createElement("div");
        div.className = "row";
        div.innerHTML = `
            <div class="row-content">
                <span class="name">${m.name}</span>
                ${m.host ? `<span class="dot">•</span><span class="meta">${m.host}</span>` : ""}
                ${m.location ? `<span class="dot">•</span><span class="meta">${m.location}</span>` : ""}
                ${m.date ? `<span class="dot">•</span><span class="meta">${formatDate(m.date)}</span>` : ""}
            </div>
            <div class="arrow">›</div>
        `;

        div.onclick = () => {
            window.location.href = `view.html?slug=${m.slug}`;
        };

        list.appendChild(div);
    });
}

document.getElementById("search").oninput = render;
loadAllMeets();
</script>

</body>
</html>
