<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gymetra Coach Insights</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
    --bg: #000;
    --card: #111;
    --text: #fff;
    --sub: #8e8e93;
    --border: #2c2c2e;
    --accent: #0A84FF;
}
body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
}
.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 30px 20px;
}
h1 {
    margin: 0 0 20px;
}
input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 16px;
    margin-bottom: 20px;
}
.athlete-list {
    display: grid;
    gap: 10px;
}
.athlete-row {
    background: var(--card);
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    cursor: pointer;
}
.athlete-row:hover {
    border-color: var(--accent);
}
.chart-card {
    margin-top: 30px;
    background: var(--card);
    border-radius: 16px;
    padding: 20px;
    border: 1px solid var(--border);
}
.meta {
    color: var(--sub);
    font-size: 13px;
}
</style>
</head>
<body>
<div class="container">
    <h1>Gymetra Coach Insights</h1>
    <input id="search" placeholder="Search athlete...">
    <div id="athlete-list" class="athlete-list"></div>
    <div id="chart-area"></div>
</div>
<script>
const SUPABASE_URL = "https://ulexxpaatpjtpgkancew.supabase.co/rest/v1/meets";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsZXh4cGFhdHBqdHBna2FuY2V3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTIyNDMsImV4cCI6MjA4OTYyODI0M30.gqKgykSN65QKxTWC7WwsjsUijrfNi0QviwyccZBrPkA";

let MEETS = [];
let ATHLETES = {};
let currentChart = null;

function athleteKey(a) {
    return `${a.firstName}|${a.lastName}|${a.club}|${a.level}`.toLowerCase();
}

function athleteDisplay(a) {
    return `${a.firstName} ${a.lastName}`;
}

async function loadRealMeets() {
    try {
        const response = await fetch(SUPABASE_URL, {
            headers: {
                apikey: SUPABASE_KEY,
                Authorization: `Bearer ${SUPABASE_KEY}`
            }
        });

        const rows = await response.json();

        // ✅ extraer SOLO el data JSON interno
        MEETS = rows
            .map(row => row.data)
            .filter(Boolean);

        buildDatabase();
        renderList();

    } catch (error) {
        console.error("Error loading meets", error);
    }
}

function buildDatabase() {
    ATHLETES = {};

    MEETS.forEach(meetData => {
        if (!meetData.events?.length) return;

        const meetName = meetData.meet?.name || "Meet";
        const meetDate = meetData.meet?.startDate || "";

        const athleteScores = {};

        meetData.events.forEach(event => {
            if (!event.results?.length) return;

            event.results.forEach(r => {
                const athlete = r.athlete;
                if (!athlete) return;

                const key = athleteKey(athlete);
                const score = Number(r.score) || 0;

                if (!athleteScores[key]) {
                    athleteScores[key] = {
                        athlete,
                        total: 0
                    };
                }

                athleteScores[key].total += score;
            });
        });

        Object.entries(athleteScores).forEach(([key, value]) => {
            if (!ATHLETES[key]) {
                ATHLETES[key] = {
                    athlete: value.athlete,
                    history: []
                };
            }

            ATHLETES[key].history.push({
                meet: meetName,
                date: meetDate,
                score: value.total
            });
        });
    });

    Object.values(ATHLETES).forEach(entry => {
        entry.history.sort((a, b) => new Date(a.date) - new Date(b.date));
    });
}


    ATHLETES = {};

    MEETS.forEach(meetData => {
        if (!meetData.events) return;

        const aaEvent = meetData.events.find(e => e.event === "allAround");
        if (!aaEvent) return;

        aaEvent.results.forEach(r => {
            const athlete = r.athlete;
            if (!athlete) return;

            const key = athleteKey(athlete);

            if (!ATHLETES[key]) {
                ATHLETES[key] = {
                    athlete,
                    history: []
                };
            }

            ATHLETES[key].history.push({
                meet: meetData.meet?.name || "Meet",
                date: meetData.meet?.startDate || "",
                score: Number(r.score) || 0
            });
        });
    });

    // ✅ ordenar por fecha
    Object.values(ATHLETES).forEach(entry => {
        entry.history.sort((a, b) => new Date(a.date) - new Date(b.date));
    });
}

function renderList() {
    const q = document.getElementById("search").value.toLowerCase();
    const list = document.getElementById("athlete-list");
    list.innerHTML = "";

    Object.values(ATHLETES)
        .filter(a => athleteDisplay(a.athlete).toLowerCase().includes(q))
        .forEach(entry => {
            const div = document.createElement("div");
            div.className = "athlete-row";
            div.innerHTML = `
                <b>${athleteDisplay(entry.athlete)}</b>
                <div class="meta">${entry.athlete.club} • ${entry.athlete.level}</div>
            `;
            div.onclick = () => showChart(entry);
            list.appendChild(div);
        });
}

function showChart(entry) {
    const chartArea = document.getElementById("chart-area");

    chartArea.innerHTML = `
        <div class="chart-card">
            <h2>${athleteDisplay(entry.athlete)}</h2>
            <canvas id="scoreChart"></canvas>
        </div>
    `;

    const labels = entry.history.map(h => h.meet);
    const scores = entry.history.map(h => h.score);

    const ctx = document.getElementById("scoreChart");

    if (currentChart) currentChart.destroy();

    currentChart = new Chart(ctx, {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: "AA Score",
                data: scores,
                tension: 0.3
            }]
        }
    });
}

document.getElementById("search").oninput = renderList;

// ✅ REAL DATA
loadRealMeets();
</script>
</body>
</html>
