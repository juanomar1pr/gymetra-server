<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gymetra Performance</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
    --bg: #000;
    --card: #111;
    --text: #fff;
    --sub: #8e8e93;
    --border: #2c2c2e;
    --accent: #0A84FF;
}
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    background-color: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;

    /* layered premium background */
    background-image:
        radial-gradient(circle at top right, rgba(10,132,255,0.18), transparent 35%),
        radial-gradient(circle at bottom left, rgba(255,255,255,0.05), transparent 30%),
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:
        auto,
        auto,
        32px 32px,
        32px 32px;
}
.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 30px 20px;
}
h1 {
    margin: 0 0 20px;
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -0.02em;
}
input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 16px;
    margin-bottom: 20px;
}
.athlete-list {
    display: none;
    gap: 10px;
    margin-top: 10px;
}
.athlete-row {
    background: var(--card);
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    cursor: pointer;
}
.athlete-row:hover {
    border-color: var(--accent);
}
.chart-card {
    margin-top: 30px;
    background: rgba(17,17,17,0.75);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 24px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 40px rgba(0,0,0,0.35);
}
.meta {
    color: var(--sub);
    font-size: 13px;
}
</style>
</head>
<body>
<div class="container">
    <h1>Gymetra Performance</h1>
  <input 
    id="search"
    placeholder="Search athlete..."
    autocomplete="off"
    autocorrect="off"
    autocapitalize="none"
    spellcheck="false"
/>
    <div id="athlete-list" class="athlete-list"></div>
    <div id="chart-area"></div>
</div>
<script>
 const SUPABASE_URL = "https://ulexxpaatpjtpgkancew.supabase.co/rest/v1/meets";
const SUPABASE_KEY = "sb_publishable_rF-UPEX2zhC5cZztSFeGaQ_-7bjyloC";

const athleteFromURL = new URLSearchParams(window.location.search)
    .get("athlete");
let MEETS = [];
let ATHLETES = {};
let currentChart = null;

function athleteKey(a) {
    return String(
        a.federationID ||
        `${a.firstName}|${a.lastName}|${a.birthDate || ""}`
    ).toLowerCase().trim();
}
function athleteDisplay(a) {
    return `${a.firstName} ${a.lastName}`;
}

async function loadRealMeets() {
    try {
        const response = await fetch(SUPABASE_URL, {
            headers: {
                apikey: SUPABASE_KEY,
                Authorization: `Bearer ${SUPABASE_KEY}`
            }
        });

        const rows = await response.json();

        MEETS = rows.map(row => row.data).filter(Boolean);
buildDatabase();

if (athleteFromURL) {
    const decodedKey = decodeURIComponent(athleteFromURL)
        .toLowerCase()
        .trim();

    const entry = Object.values(ATHLETES).find(a => {
        return athleteKey(a.athlete) === decodedKey;
    });

    if (entry) {
        showChart(entry);
        document.getElementById("search").value =
            `${entry.athlete.firstName} ${entry.athlete.lastName}`;
        return;
    }
}

renderList();
   
    } catch (error) {
        console.error("Error loading meets", error);
    }
}


function buildDatabase() {
    ATHLETES = {};

    MEETS.forEach(meetData => {
        if (!meetData.events?.length) return;

        const meetName = meetData.meet?.name || "Meet";
        const meetDate = meetData.meet?.startDate || "";
        const athleteScores = {};

        meetData.events.forEach(event => {
            if (!event.results?.length) return;

            event.results.forEach(r => {
                const athlete = r.athlete;
                if (!athlete) return;

                const key = athleteKey(athlete);
                const score = Number(r.score) || 0;
                const eventName = event.event;

                if (!athleteScores[key]) {
                    athleteScores[key] = {
                        athlete,
                        events: {},
                        total: 0
                    };
                }

                athleteScores[key].events[eventName] = score;
                athleteScores[key].total += score;
            });
        });

        Object.entries(athleteScores).forEach(([key, value]) => {
            if (!ATHLETES[key]) {
                ATHLETES[key] = {
                    athlete: value.athlete,
                    history: []
                };
            }

            ATHLETES[key].history.push({
                meet: meetName,
                date: meetDate,
                aa: value.total,
                floor: value.events.floor || 0,
                vault: value.events.vault || 0,
                bars: value.events.bars || 0,
                beam: value.events.beam || 0
            });
        });
    });

    Object.values(ATHLETES).forEach(entry => {
        entry.history.sort((a, b) => new Date(a.date) - new Date(b.date));
    });
}

function renderList() {
    const q = document.getElementById("search").value.trim().toLowerCase();
    const list = document.getElementById("athlete-list");

    list.innerHTML = "";

    if (!q) {
        list.style.display = "none";
        return;
    }

  const filtered = Object.values(ATHLETES).filter(entry => {
    const athlete = entry.athlete;

    const searchable = [
        athlete.firstName,
        athlete.lastName,
        athlete.club,
        athlete.level
    ]
    .join(" ")
    .toLowerCase();

    return searchable.includes(q);
});

    if (!filtered.length) {
        list.style.display = "grid";
        list.innerHTML = `<div class="meta">No athletes found</div>`;
        return;
    }

    list.style.display = "grid";

    filtered.forEach(entry => {
        const div = document.createElement("div");
        div.className = "athlete-row";
        div.innerHTML = `
            <b>${athleteDisplay(entry.athlete)}</b>
            <div class="meta">${entry.athlete.club} • ${entry.athlete.level}</div>
        `;

div.addEventListener("click", () => {
    showChart(entry);
    list.style.display = "none";
    list.innerHTML = "";
});



        list.appendChild(div);
    });
}

function showChart(entry) {
    const chartArea = document.getElementById("chart-area");

    chartArea.innerHTML = `
        <div class="chart-card">
            <h2>${athleteDisplay(entry.athlete)}</h2>
            <div style="height:400px">
    <canvas id="scoreChart"></canvas>
</div>
        </div>
    `;

    const ctx = document.getElementById("scoreChart");

    if (currentChart) currentChart.destroy();

    currentChart = new Chart(ctx, {
        type: "line",
        data: {
            labels: entry.history.map(h => h.meet),
           datasets: [
    {
        label: "AA",
        data: entry.history.map(h => h.aa),
        tension: 0.3
    },
    {
        label: "Floor",
        data: entry.history.map(h => h.floor),
        tension: 0.3,
        hidden: true
    },
    {
        label: "Vault",
        data: entry.history.map(h => h.vault),
        tension: 0.3,
        hidden: true
    },
    {
        label: "Bars",
        data: entry.history.map(h => h.bars),
        tension: 0.3,
        hidden: true
    },
    {
        label: "Beam",
        data: entry.history.map(h => h.beam),
        tension: 0.3,
        hidden: true
    }
]
        },
        options: {
            responsive: true,
            interaction: {
                mode: "index",
                intersect: false
            }
        }
    });
}

const searchInput = document.getElementById("search");

["input", "keyup", "change"].forEach(evt => {
    searchInput.addEventListener(evt, renderList);
});

loadRealMeets();
</script>
</body>
</html>
