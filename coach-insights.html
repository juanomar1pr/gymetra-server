<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gymetra Coach Insights</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
    --bg: #000;
    --card: #111;
    --text: #fff;
    --sub: #8e8e93;
    --border: #2c2c2e;
    --accent: #0A84FF;
}
body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
}
.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 30px 20px;
}
h1 {
    margin: 0 0 20px;
}
input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 16px;
    margin-bottom: 20px;
}
.athlete-list {
    display: none;
    gap: 10px;
    margin-top: 10px;
}
.athlete-row {
    background: var(--card);
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    cursor: pointer;
}
.athlete-row:hover {
    border-color: var(--accent);
}
.chart-card {
    margin-top: 30px;
    background: var(--card);
    border-radius: 16px;
    padding: 20px;
    border: 1px solid var(--border);
}
.meta {
    color: var(--sub);
    font-size: 13px;
}
</style>
</head>
<body>
<div class="container">
    <h1>Gymetra Coach Insights</h1>
  <input 
    id="search"
    placeholder="Search athlete..."
    autocomplete="off"
    autocorrect="off"
    autocapitalize="none"
    spellcheck="false"
/>
    <div id="athlete-list" class="athlete-list"></div>
    <div id="chart-area"></div>
</div>
<script>
 const SUPABASE_URL = "https://ulexxpaatpjtpgkancew.supabase.co/rest/v1/meets";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsZXh4cGFhdHBqdHBna2FuY2V3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTIyNDMsImV4cCI6MjA4OTYyODI0M30.gqKgykSN65QKxTWC7WwsjsUijrfNi0QviwyccZBrPkA";


let MEETS = [];
let ATHLETES = {};
let currentChart = null;

function athleteKey(a) {
    return `${a.firstName}|${a.lastName}|${a.club}|${a.level}`.toLowerCase();
}

function athleteDisplay(a) {
    return `${a.firstName} ${a.lastName}`;
}

async function loadRealMeets() {
    try {
        const response = await fetch(SUPABASE_URL, {
            headers: {
                apikey: SUPABASE_KEY,
                Authorization: `Bearer ${SUPABASE_KEY}`
            }
        });

        const rows = await response.json();

        MEETS = rows.map(row => row.data).filter(Boolean);

        buildDatabase();

        // 🔥 refrescar búsqueda si ya escribieron algo
        renderList();

    } catch (error) {
        console.error("Error loading meets", error);
    }
}


function buildDatabase() {
    ATHLETES = {};

    MEETS.forEach(meetData => {
        if (!meetData.events?.length) return;

        const meetName = meetData.meet?.name || "Meet";
        const meetDate = meetData.meet?.startDate || "";
        const athleteScores = {};

        meetData.events.forEach(event => {
            if (!event.results?.length) return;

            event.results.forEach(r => {
                const athlete = r.athlete;
                if (!athlete) return;

                const key = athleteKey(athlete);
                const score = Number(r.score) || 0;
                const eventName = event.event;

                if (!athleteScores[key]) {
                    athleteScores[key] = {
                        athlete,
                        events: {},
                        total: 0
                    };
                }

                athleteScores[key].events[eventName] = score;
                athleteScores[key].total += score;
            });
        });

        Object.entries(athleteScores).forEach(([key, value]) => {
            if (!ATHLETES[key]) {
                ATHLETES[key] = {
                    athlete: value.athlete,
                    history: []
                };
            }

            ATHLETES[key].history.push({
                meet: meetName,
                date: meetDate,
                aa: value.total,
                floor: value.events.floor || 0,
                vault: value.events.vault || 0,
                bars: value.events.bars || 0,
                beam: value.events.beam || 0
            });
        });
    });

    Object.values(ATHLETES).forEach(entry => {
        entry.history.sort((a, b) => new Date(a.date) - new Date(b.date));
    });
}

function renderList() {
    const q = document.getElementById("search").value.trim().toLowerCase();
    const list = document.getElementById("athlete-list");

    list.innerHTML = "";

    if (!q) {
        list.style.display = "none";
        return;
    }

  const filtered = Object.values(ATHLETES).filter(entry => {
    const athlete = entry.athlete;

    const searchable = [
        athlete.firstName,
        athlete.lastName,
        athlete.club,
        athlete.level
    ]
    .join(" ")
    .toLowerCase();

    return searchable.includes(q);
});

    if (!filtered.length) {
        list.style.display = "grid";
        list.innerHTML = `<div class="meta">No athletes found</div>`;
        return;
    }

    list.style.display = "grid";

    filtered.forEach(entry => {
        const div = document.createElement("div");
        div.className = "athlete-row";
        div.innerHTML = `
            <b>${athleteDisplay(entry.athlete)}</b>
            <div class="meta">${entry.athlete.club} • ${entry.athlete.level}</div>
        `;

div.addEventListener("click", () => {
    showChart(entry);
    list.style.display = "none";
    list.innerHTML = "";
});



        list.appendChild(div);
    });
}

function showChart(entry) {
    const chartArea = document.getElementById("chart-area");

    chartArea.innerHTML = `
        <div class="chart-card">
            <h2>${athleteDisplay(entry.athlete)}</h2>
            <div style="height:400px">
    <canvas id="scoreChart"></canvas>
</div>
        </div>
    `;

    const ctx = document.getElementById("scoreChart");

    if (currentChart) currentChart.destroy();

    currentChart = new Chart(ctx, {
        type: "line",
        data: {
            labels: entry.history.map(h => h.meet),
            datasets: [
                { label: "AA", data: entry.history.map(h => h.aa), tension: 0.3 },
                { label: "Floor", data: entry.history.map(h => h.floor), tension: 0.3 },
                { label: "Vault", data: entry.history.map(h => h.vault), tension: 0.3 },
                { label: "Bars", data: entry.history.map(h => h.bars), tension: 0.3 },
                { label: "Beam", data: entry.history.map(h => h.beam), tension: 0.3 }
            ]
        },
        options: {
            responsive: true,
            interaction: {
                mode: "index",
                intersect: false
            }
        }
    });
}

const searchInput = document.getElementById("search");

["input", "keyup", "change"].forEach(evt => {
    searchInput.addEventListener(evt, renderList);
});

loadRealMeets();
</script>
</body>
</html>
