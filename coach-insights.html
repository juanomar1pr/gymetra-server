<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="fa.png?v=7">
<link rel="shortcut icon" href="fa.png?v=7">
<link rel="apple-touch-icon" href="fa.png?v=7">
<title>Gymetra Performance</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --bg:#000;
  --card:#0e0e10;
  --card-2:#141417;
  --text:#fff;
  --sub:#8e8e93;
  --sub-2:#6b6b70;
  --border:rgba(255,255,255,0.08);
  --border-strong:rgba(255,255,255,0.14);
  --accent:#0A84FF;
  --accent-2:#5E5CE6;
  --pink:#FF375F;
  --green:#30D158;
  --orange:#FF9F0A;
  --yellow:#FFD60A;
  --mint:#63E6E2;
  --violet:#BF5AF2;

  --c-aa:#0A84FF;
  --c-floor:#FF9F0A;
  --c-vault:#30D158;
  --c-bars:#BF5AF2;
  --c-beam:#FF375F;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Inter,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  letter-spacing:-0.01em;
  overflow-x:hidden;
}

/* Aurora background */
body::before,
body::after{
  content:"";
  position:fixed;
  inset:-20%;
  z-index:-2;
  pointer-events:none;
  filter:blur(80px);
  opacity:.55;
}
body::before{
  background:
    radial-gradient(40% 35% at 80% 10%, rgba(94,92,230,.45), transparent 70%),
    radial-gradient(35% 30% at 10% 90%, rgba(10,132,255,.35), transparent 70%),
    radial-gradient(30% 25% at 60% 80%, rgba(255,55,95,.25), transparent 70%);
  animation:float1 18s ease-in-out infinite alternate;
}
body::after{
  background:
    radial-gradient(25% 20% at 30% 20%, rgba(191,90,242,.35), transparent 70%),
    radial-gradient(25% 25% at 90% 70%, rgba(48,209,88,.22), transparent 70%);
  animation:float2 22s ease-in-out infinite alternate;
}
@keyframes float1{to{transform:translate3d(-4%,3%,0) scale(1.1)}}
@keyframes float2{to{transform:translate3d(5%,-4%,0) scale(1.15)}}

/* Grid overlay */
.grid-overlay{
  position:fixed;inset:0;z-index:-1;pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(ellipse at center, #000 30%, transparent 75%);
}

.container{
  max-width:980px;
  margin:0 auto;
  padding:48px 22px 80px;
  animation:fadeUp .8s cubic-bezier(.2,.7,.2,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.brand{
  display:flex;align-items:center;gap:12px;margin-bottom:18px;
}
.brand-dot{
  width:34px;height:34px;border-radius:10px;
  background:conic-gradient(from 220deg,var(--accent),var(--accent-2),var(--violet),var(--pink),var(--accent));
  box-shadow:0 8px 30px rgba(10,132,255,.35), inset 0 0 0 1px rgba(255,255,255,.15);
  position:relative;
}
.brand-dot::after{
  content:"";position:absolute;inset:6px;border-radius:6px;
  background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
}
.brand-name{font-weight:600;color:var(--sub);letter-spacing:.04em;text-transform:uppercase;font-size:12px}

h1{
  margin:4px 0 6px;
  font-size:clamp(34px,5.6vw,56px);
  font-weight:700;
  letter-spacing:-0.035em;
  background:linear-gradient(180deg,#fff 0%, #b8b8bf 120%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  line-height:1.02;
}
.subtitle{color:var(--sub);font-size:15px;margin:0 0 28px}

/* Search */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap svg{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  width:18px;height:18px;color:var(--sub);pointer-events:none;
}
input#search{
  width:100%;
  padding:16px 18px 16px 44px;
  border-radius:16px;
  border:1px solid var(--border);
  background:linear-gradient(180deg,rgba(22,22,25,.85),rgba(14,14,16,.85));
  color:var(--text);
  font-size:16px;
  outline:none;
  transition:border-color .25s, box-shadow .25s, transform .25s;
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
}
input#search::placeholder{color:var(--sub-2)}
input#search:focus{
  border-color:rgba(10,132,255,.55);
  box-shadow:0 0 0 4px rgba(10,132,255,.18), 0 10px 30px rgba(0,0,0,.5);
}

/* Athlete list */
.athlete-list{display:none;gap:8px;margin-top:10px;grid-template-columns:1fr}
.athlete-row{
  background:linear-gradient(180deg,rgba(22,22,25,.9),rgba(14,14,16,.9));
  padding:14px 16px;
  border-radius:14px;
  border:1px solid var(--border);
  cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  transition:border-color .2s, transform .2s, background .2s;
  animation:fadeUp .35s ease both;
}
.athlete-row:hover{
  border-color:rgba(10,132,255,.55);
  transform:translateY(-1px);
  background:linear-gradient(180deg,rgba(26,26,30,.95),rgba(18,18,22,.95));
}
.athlete-row .avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--violet));
  display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.15);
  flex-shrink:0;
}
.athlete-row .who{display:flex;align-items:center;gap:12px;min-width:0}
.athlete-row b{font-weight:600}
.athlete-row .chev{color:var(--sub-2);flex-shrink:0}
.meta{color:var(--sub);font-size:13px}

/* KPI cards */
.kpi-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:26px;
}
@media (max-width:720px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi{
  position:relative;overflow:hidden;
  background:linear-gradient(180deg,rgba(22,22,26,.85),rgba(12,12,14,.85));
  border:1px solid var(--border);
  border-radius:18px;padding:16px 16px 18px;
  backdrop-filter:blur(14px);
  animation:fadeUp .5s ease both;
}
.kpi:nth-child(1){animation-delay:.02s}
.kpi:nth-child(2){animation-delay:.08s}
.kpi:nth-child(3){animation-delay:.14s}
.kpi:nth-child(4){animation-delay:.20s}
.kpi::after{
  content:"";position:absolute;inset:-1px;border-radius:inherit;pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,.08),transparent 40%);
  mask:linear-gradient(#000,#000) content-box,linear-gradient(#000,#000);
  mask-composite:exclude;-webkit-mask-composite:xor;padding:1px;
}
.kpi-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--sub)}
.kpi-value{font-size:28px;font-weight:700;letter-spacing:-0.02em;margin-top:6px;font-variant-numeric:tabular-nums}
.kpi-sub{font-size:12px;color:var(--sub);margin-top:4px}
.kpi-trend{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:12px;font-weight:600;margin-top:6px}
.kpi-trend.up{background:rgba(48,209,88,.15);color:var(--green)}
.kpi-trend.down{background:rgba(255,55,95,.15);color:var(--pink)}
.kpi-trend.flat{background:rgba(142,142,147,.18);color:var(--sub)}

/* Chart card */
.chart-card{
  margin-top:22px;
  background:linear-gradient(180deg,rgba(20,20,24,.72),rgba(10,10,12,.72));
  backdrop-filter:blur(20px) saturate(140%);
  -webkit-backdrop-filter:blur(20px) saturate(140%);
  border-radius:24px;
  padding:22px 22px 24px;
  border:1px solid var(--border-strong);
  box-shadow:
    0 30px 70px rgba(0,0,0,.55),
    0 2px 0 rgba(255,255,255,.04) inset,
    0 -30px 80px -40px rgba(94,92,230,.4) inset;
  animation:fadeUp .6s ease both;
  position:relative;overflow:hidden;
}
.chart-card::before{
  content:"";position:absolute;top:-40%;right:-20%;width:60%;height:120%;
  background:radial-gradient(circle,rgba(94,92,230,.25),transparent 60%);
  pointer-events:none;
}

.chart-header{
  display:flex;align-items:flex-start;justify-content:space-between;gap:18px;flex-wrap:wrap;
  margin-bottom:16px;
}
.chart-title{margin:0;font-size:22px;font-weight:700;letter-spacing:-0.02em}
.chart-sub{color:var(--sub);font-size:13px;margin-top:2px}

/* Segmented control */
.segmented{
  display:inline-flex;background:rgba(255,255,255,.06);
  border:1px solid var(--border);border-radius:12px;padding:3px;gap:2px;
  backdrop-filter:blur(10px);
}
.segmented button{
  appearance:none;border:0;background:transparent;color:var(--sub);
  padding:8px 14px;font-size:13px;font-weight:600;border-radius:9px;cursor:pointer;
  transition:color .2s, background .25s, transform .2s;
  font-family:inherit;letter-spacing:-0.01em;
}
.segmented button:hover{color:#fff}
.segmented button.active{
  color:#fff;
  background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.06));
  box-shadow:0 2px 10px rgba(0,0,0,.35), inset 0 0 0 1px rgba(255,255,255,.12);
}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 6px}
.chip{
  --dot:#fff;
  display:inline-flex;align-items:center;gap:8px;
  padding:7px 12px;border-radius:999px;cursor:pointer;user-select:none;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  color:var(--sub);font-size:12.5px;font-weight:600;
  transition:all .2s ease;
}
.chip .d{width:8px;height:8px;border-radius:50%;background:var(--dot);box-shadow:0 0 10px var(--dot)}
.chip.on{color:#fff;background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.18)}
.chip:hover{transform:translateY(-1px)}
.chip.off .d{opacity:.35;box-shadow:none}

.chart-box{position:relative;height:420px;margin-top:6px}

/* Empty */
.empty{
  border:1px dashed var(--border-strong);
  border-radius:18px;padding:36px;text-align:center;color:var(--sub);
  margin-top:24px;
}

/* Scrollbar */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#26262a;border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:#35353a}
</style>
</head>
<body>
<div class="grid-overlay"></div>
<div class="container">
  <div class="brand">
    <div class="brand-dot"></div>
    <div class="brand-name">Gymetra</div>
  </div>
  <h1>Performance</h1>
  <p class="subtitle">Track every meet, every apparatus, every milestone.</p>

  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input
      id="search"
      placeholder="Search athlete, club or level…"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="none"
      spellcheck="false"
    />
  </div>
  <div id="athlete-list" class="athlete-list"></div>
  <div id="chart-area"></div>
</div>

<script>
const SUPABASE_URL = "https://ulexxpaatpjtpgkancew.supabase.co/rest/v1/meets";
const SUPABASE_KEY = "sb_publishable_rF-UPEX2zhC5cZztSFeGaQ_-7bjyloC";

const athleteFromURL = new URLSearchParams(window.location.search).get("athlete");
let MEETS = [];
let ATHLETES = {};
let currentChart = null;
let currentEntry = null;
let chartMode = "line"; // line | area | bar | radar
const EVENT_DEFS = [
  { key:"aa",    label:"AA",    color:"#0A84FF" },
  { key:"floor", label:"Floor", color:"#FF9F0A" },
  { key:"vault", label:"Vault", color:"#30D158" },
  { key:"bars",  label:"Bars",  color:"#BF5AF2" },
  { key:"beam",  label:"Beam",  color:"#FF375F" },
];
let visibleEvents = { aa:true, floor:false, vault:false, bars:false, beam:false };

function athleteKey(a){
  return String(a.federationID || `${a.firstName}|${a.lastName}|${a.birthDate||""}`).toLowerCase().trim();
}
function athleteDisplay(a){ return `${a.firstName} ${a.lastName}`; }
function initials(a){ return `${(a.firstName||"?")[0]}${(a.lastName||"?")[0]}`.toUpperCase(); }

async function loadRealMeets(){
  try{
    const response = await fetch(SUPABASE_URL,{
      headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` }
    });
    const rows = await response.json();
    MEETS = rows.map(r => r.data).filter(Boolean);
    buildDatabase();

    if(athleteFromURL){
      const decodedKey = decodeURIComponent(athleteFromURL).toLowerCase().trim();
      const entry = Object.values(ATHLETES).find(a => athleteKey(a.athlete) === decodedKey);
      if(entry){
        showChart(entry);
        document.getElementById("search").value = `${entry.athlete.firstName} ${entry.athlete.lastName}`;
        return;
      }
    }
    renderList();
  }catch(error){ console.error("Error loading meets", error); }
}

function buildDatabase(){
  ATHLETES = {};
  MEETS.forEach(meetData => {
    if(!meetData.events?.length) return;
    const meetName = meetData.meet?.name || "Meet";
    const meetDate = meetData.meet?.startDate || "";
    const athleteScores = {};
    meetData.events.forEach(event => {
      if(!event.results?.length) return;
      event.results.forEach(r => {
        const athlete = r.athlete; if(!athlete) return;
        const key = athleteKey(athlete);
        const score = Number(r.score) || 0;
        const eventName = event.event;
        if(!athleteScores[key]) athleteScores[key] = { athlete, events:{}, total:0 };
        athleteScores[key].events[eventName] = score;
        athleteScores[key].total += score;
      });
    });
    Object.entries(athleteScores).forEach(([key,value]) => {
      if(!ATHLETES[key]) ATHLETES[key] = { athlete:value.athlete, history:[] };
      ATHLETES[key].history.push({
        meet:meetName, date:meetDate,
        aa:value.total,
        floor:value.events.floor||0,
        vault:value.events.vault||0,
        bars:value.events.bars||0,
        beam:value.events.beam||0
      });
    });
  });
  Object.values(ATHLETES).forEach(entry => {
    entry.history.sort((a,b) => new Date(a.date) - new Date(b.date));
  });
}

function renderList(){
  const q = document.getElementById("search").value.trim().toLowerCase();
  const list = document.getElementById("athlete-list");
  list.innerHTML = "";
  if(!q){ list.style.display = "none"; return; }

  const filtered = Object.values(ATHLETES).filter(entry => {
    const a = entry.athlete;
    return [a.firstName,a.lastName,a.club,a.level].join(" ").toLowerCase().includes(q);
  });

  if(!filtered.length){
    list.style.display = "grid";
    list.innerHTML = `<div class="meta" style="padding:14px">No athletes found</div>`;
    return;
  }
  list.style.display = "grid";
  filtered.forEach(entry => {
    const div = document.createElement("div");
    div.className = "athlete-row";
    div.innerHTML = `
      <div class="who">
        <div class="avatar">${initials(entry.athlete)}</div>
        <div style="min-width:0">
          <b>${athleteDisplay(entry.athlete)}</b>
          <div class="meta">${entry.athlete.club || ""}${entry.athlete.club && entry.athlete.level ? " • " : ""}${entry.athlete.level || ""}</div>
        </div>
      </div>
      <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
    `;
    div.addEventListener("click", () => {
      showChart(entry);
      list.style.display = "none";
      list.innerHTML = "";
    });
    list.appendChild(div);
  });
}

/* ---------- KPIs ---------- */
function computeKPIs(history){
  if(!history.length) return null;
  const aas = history.map(h => h.aa);
  const best = Math.max(...aas);
  const avg = aas.reduce((s,v) => s+v, 0) / aas.length;
  const latest = aas[aas.length-1];
  const prev = aas.length > 1 ? aas[aas.length-2] : latest;
  const diff = latest - prev;
  const pct = prev ? (diff/prev)*100 : 0;
  return { best, avg, latest, diff, pct, meets:history.length };
}

/* ---------- Gradient helpers ---------- */
function makeGradient(ctx, area, color){
  const g = ctx.createLinearGradient(0, area.top, 0, area.bottom);
  g.addColorStop(0, color + "cc");
  g.addColorStop(1, color + "00");
  return g;
}

/* ---------- Glow plugin ---------- */
const glowPlugin = {
  id:"glow",
  beforeDatasetsDraw(chart){
    const {ctx} = chart;
    ctx.save();
    ctx.shadowColor = "rgba(10,132,255,.35)";
    ctx.shadowBlur = 16;
  },
  afterDatasetsDraw(chart){ chart.ctx.restore(); }
};

/* ---------- Chart renderer ---------- */
function buildDatasets(entry, area, ctx){
  return EVENT_DEFS.filter(e => visibleEvents[e.key]).map(def => {
    const base = {
      label:def.label,
      data:entry.history.map(h => h[def.key]),
      borderColor:def.color,
      backgroundColor: chartMode === "bar"
        ? def.color + "bb"
        : (area ? makeGradient(ctx, area, def.color) : def.color + "33"),
      pointBackgroundColor:"#0e0e10",
      pointBorderColor:def.color,
      pointBorderWidth:2,
      pointRadius:4,
      pointHoverRadius:7,
      pointHoverBorderWidth:3,
      borderWidth:2.5,
      tension:0.4,
      fill: chartMode === "area",
      spanGaps:true,
    };
    if(chartMode === "bar"){
      base.borderRadius = 8;
      base.borderSkipped = false;
      base.borderWidth = 0;
      base.backgroundColor = def.color + "cc";
      base.hoverBackgroundColor = def.color;
    }
    if(chartMode === "radar"){
      base.fill = true;
      base.backgroundColor = def.color + "33";
      base.borderWidth = 2;
      base.pointBackgroundColor = def.color;
    }
    return base;
  });
}

function renderChart(){
  if(!currentEntry) return;
  const canvas = document.getElementById("scoreChart");
  const ctx = canvas.getContext("2d");
  if(currentChart) currentChart.destroy();

  let type = chartMode === "area" ? "line" : chartMode;
  const isRadar = chartMode === "radar";

  // For radar, use averaged per-event snapshot (last meet)
  let labels, datasets;
  if(isRadar){
    const last = currentEntry.history[currentEntry.history.length-1];
    labels = ["Floor","Vault","Bars","Beam"];
    datasets = [{
      label: last?.meet || "Latest",
      data: [last?.floor||0,last?.vault||0,last?.bars||0,last?.beam||0],
      borderColor:"#0A84FF",
      backgroundColor:"rgba(10,132,255,.22)",
      pointBackgroundColor:"#0A84FF",
      pointBorderColor:"#fff",
      borderWidth:2,
      pointRadius:4,
    }];
    if(currentEntry.history.length > 1){
      const first = currentEntry.history[0];
      datasets.push({
        label:first.meet || "First",
        data:[first.floor||0,first.vault||0,first.bars||0,first.beam||0],
        borderColor:"#BF5AF2",
        backgroundColor:"rgba(191,90,242,.18)",
        pointBackgroundColor:"#BF5AF2",
        pointBorderColor:"#fff",
        borderWidth:2,
        pointRadius:4,
      });
    }
  } else {
    labels = currentEntry.history.map(h => h.meet);
    datasets = buildDatasets(currentEntry, null, ctx);
  }

  currentChart = new Chart(ctx, {
    type,
    data:{ labels, datasets },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction:{ mode:"index", intersect:false },
      animation:{ duration:900, easing:"easeOutCubic" },
      layout:{ padding:{ top:10,right:10,bottom:0,left:0 } },
      plugins:{
        legend:{
          display:isRadar,
          labels:{ color:"#d1d1d6", usePointStyle:true, boxWidth:8, font:{ size:12, weight:"600" } }
        },
        tooltip:{
          enabled:true,
          backgroundColor:"rgba(20,20,24,.92)",
          borderColor:"rgba(255,255,255,.12)",
          borderWidth:1,
          titleColor:"#fff",
          bodyColor:"#d1d1d6",
          padding:12,
          cornerRadius:12,
          displayColors:true,
          boxPadding:6,
          titleFont:{ weight:"700", size:13 },
          bodyFont:{ size:12 },
        }
      },
      scales: isRadar ? {
        r:{
          angleLines:{ color:"rgba(255,255,255,.08)" },
          grid:{ color:"rgba(255,255,255,.08)" },
          pointLabels:{ color:"#d1d1d6", font:{ size:12, weight:"600" } },
          ticks:{ color:"#6b6b70", backdropColor:"transparent", showLabelBackdrop:false }
        }
      } : {
        x:{
          grid:{ color:"rgba(255,255,255,.05)", drawBorder:false },
          ticks:{ color:"#8e8e93", font:{ size:11, weight:"500" }, maxRotation:0, autoSkip:true }
        },
        y:{
          grid:{ color:"rgba(255,255,255,.05)", drawBorder:false },
          ticks:{ color:"#8e8e93", font:{ size:11, weight:"500" } },
          beginAtZero:false
        }
      }
    },
    plugins: chartMode === "line" || chartMode === "area" ? [glowPlugin] : []
  });

  // Apply gradients now that chartArea exists (for area fills)
  if(chartMode === "area" || chartMode === "line"){
    const area = currentChart.chartArea;
    currentChart.data.datasets.forEach((ds,i) => {
      const def = EVENT_DEFS.filter(e => visibleEvents[e.key])[i];
      if(!def) return;
      ds.backgroundColor = makeGradient(ctx, area, def.color);
    });
    currentChart.update("none");
  }
}

function renderKPIs(entry){
  const k = computeKPIs(entry.history);
  if(!k) return "";
  const trendClass = k.diff > 0.05 ? "up" : k.diff < -0.05 ? "down" : "flat";
  const arrow = k.diff > 0.05 ? "▲" : k.diff < -0.05 ? "▼" : "■";
  return `
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Best AA</div><div class="kpi-value">${k.best.toFixed(3)}</div><div class="kpi-sub">Personal best</div></div>
      <div class="kpi"><div class="kpi-label">Average</div><div class="kpi-value">${k.avg.toFixed(3)}</div><div class="kpi-sub">Across ${k.meets} meet${k.meets===1?"":"s"}</div></div>
      <div class="kpi"><div class="kpi-label">Latest</div><div class="kpi-value">${k.latest.toFixed(3)}</div><div class="kpi-sub">Most recent meet</div></div>
      <div class="kpi">
        <div class="kpi-label">Trend</div>
        <div class="kpi-value">${k.diff>=0?"+":""}${k.diff.toFixed(3)}</div>
        <span class="kpi-trend ${trendClass}">${arrow} ${isFinite(k.pct)? (k.pct>=0?"+":"")+k.pct.toFixed(1)+"%":"—"}</span>
      </div>
    </div>
  `;
}

function renderChips(){
  return `
    <div class="chips" id="chips">
      ${EVENT_DEFS.map(e => `
        <div class="chip ${visibleEvents[e.key]?"on":"off"}" data-key="${e.key}" style="--dot:${e.color}">
          <span class="d"></span>${e.label}
        </div>
      `).join("")}
    </div>
  `;
}

function renderSegmented(){
  const modes = [
    { id:"line", label:"Line" },
    { id:"area", label:"Area" },
    { id:"bar",  label:"Bars" },
    { id:"radar",label:"Radar"},
  ];
  return `
    <div class="segmented" id="segmented">
      ${modes.map(m => `<button data-mode="${m.id}" class="${chartMode===m.id?"active":""}">${m.label}</button>`).join("")}
    </div>
  `;
}

function showChart(entry){
  currentEntry = entry;
  const a = entry.athlete;
  const chartArea = document.getElementById("chart-area");
  chartArea.innerHTML = `
    ${renderKPIs(entry)}
    <div class="chart-card">
      <div class="chart-header">
        <div>
          <h2 class="chart-title">${athleteDisplay(a)}</h2>
          <div class="chart-sub">${[a.club,a.level].filter(Boolean).join(" • ") || "—"}</div>
        </div>
        ${renderSegmented()}
      </div>
      ${renderChips()}
      <div class="chart-box"><canvas id="scoreChart"></canvas></div>
    </div>
  `;

  document.getElementById("segmented").addEventListener("click", e => {
    const btn = e.target.closest("button"); if(!btn) return;
    chartMode = btn.dataset.mode;
    document.querySelectorAll("#segmented button").forEach(b => b.classList.toggle("active", b===btn));
    renderChart();
  });

  document.getElementById("chips").addEventListener("click", e => {
    const chip = e.target.closest(".chip"); if(!chip) return;
    const key = chip.dataset.key;
    visibleEvents[key] = !visibleEvents[key];
    if(!Object.values(visibleEvents).some(Boolean)) visibleEvents[key] = true; // keep at least 1
    chip.classList.toggle("on", visibleEvents[key]);
    chip.classList.toggle("off", !visibleEvents[key]);
    renderChart();
  });

  renderChart();
}

const searchInput = document.getElementById("search");
["input","keyup","change"].forEach(evt => searchInput.addEventListener(evt, renderList));

loadRealMeets();
</script>
</body>
</html>
