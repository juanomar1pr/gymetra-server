<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/fa.ico?v=5">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/fa.png?v=5">
    <title>Gymetra Meets | Live Results</title>

    <style>
        :root {
            --bg: #000000;
            --surface: #1c1c1e;
            --accent: #8b5cf6;
            --text: #ffffff;
            --sub: #8e8e93;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin: 0; }
        .header p { color: var(--sub); font-size: 16px; margin-top: 8px; }

        /* --- SKELETON LOADING (EL TOQUE PROFESIONAL) --- */
        #skeleton { display: flex; flex-direction: column; gap: 12px; }
        .sk-card {
            height: 70px;
            background: var(--surface);
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .sk-card::after {
            content: "";
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            transform: translateX(-100%);
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 100% { transform: translateX(100%); } }

        /* --- LISTA REAL --- */
        .meet-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            padding: 20px;
            border-radius: 16px;
            text-decoration: none;
            color: inherit;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        .meet-link:hover { transform: scale(1.02); border-color: var(--accent); }
        .meet-name { font-weight: 700; font-size: 18px; }
        .meet-badge { font-size: 12px; background: rgba(139, 92, 246, 0.2); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-weight: 600; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Active Meets</h1>
        <p>Select a competition to view live results</p>
    </div>

    <div id="skeleton">
        <div class="sk-card"></div>
        <div class="sk-card"></div>
        <div class="sk-card"></div>
    </div>

    <div id="meets-list" class="hidden"></div>
</div>

<script>
    const SB_URL = "https://ulexxpaatpjtpgkancew.supabase.co/rest/v1/meets";
    const SB_KEY = "TU_ANON_KEY_AQUI"; // REEMPLAZA CON TU ANON KEY

    async function load() {
        try {
            const response = await fetch(`${SB_URL}?select=slug`, {
                headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
            });
            const data = await response.json();
            
            const list = document.getElementById('meets-list');
            const skeleton = document.getElementById('skeleton');

            list.innerHTML = "";
            
            if (data.length === 0) {
                list.innerHTML = "<p style='text-align:center; color:gray;'>No competitions found.</p>";
            } else {
                data.forEach(m => {
                    const a = document.createElement('a');
                    a.className = 'meet-link';
                    // IMPORTANTE: Asegúrate que la ruta a view.html sea correcta
                    a.href = `view.html?slug=${m.slug}`; 
                    a.innerHTML = `
                        <span class="meet-name">${m.slug.toUpperCase()}</span>
                        <span class="meet-badge">LIVE</span>
                    `;
                    list.appendChild(a);
                });
            }

            // Quitamos el skeleton y mostramos la lista
            skeleton.classList.add('hidden');
            list.classList.remove('hidden');

        } catch (e) {
            console.error(e);
            document.getElementById('skeleton').innerHTML = "<p>Error loading data.</p>";
        }
    }

    // Esperar 800ms para que se vea el efecto shimmer y luego cargar
    setTimeout(load, 800);
</script>

</body>
</html>
