<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- FAVICONS -->
    <link rel="shortcut icon" href="/fa.ico?v=5" type="image/x-icon">
    <link rel="icon" href="/fa.ico?v=5" type="image/x-icon">
    <link rel="apple-touch-icon" href="/images/fa.png?v=5">
    <link rel="icon" type="image/png" href="/images/fa.png?v=5">

    <title>Gymetra | Gymnastics Scoring</title>

    <style>
        :root {
            --apple-black: #1d1d1f;
            --apple-gray: #86868b;
            --apple-blue: #0071e3;
            --bg-white: #ffffff;
            --bg-secondary: #f5f5f7;
            --skeleton: #e5e5e7;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            background-color: var(--bg-white);
            color: var(--apple-black);
            -webkit-font-smoothing: antialiased;
        }

        .content-wrapper { max-width: 980px; margin: 0 auto; padding: 0 20px; }

        /* HERO SECTION */
        .hero { padding: 120px 0 100px; text-align: center; border-bottom: 1px solid var(--bg-secondary); }
        .hero img { width: 120px; height: 120px; border-radius: 22%; background: #fff; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.08); margin-bottom: 40px; }
        h1 { font-size: 80px; line-height: 1.05; font-weight: 700; letter-spacing: -0.015em; margin-bottom: 30px; }
        .hero-lead { font-size: 32px; line-height: 1.125; font-weight: 600; color: var(--apple-gray); max-width: 700px; margin: 0 auto 40px; }

        /* LOADING / SKELETON ANIMATION */
        .meets-container { padding: 60px 0; }
        .skeleton-card {
            background: var(--bg-secondary);
            height: 80px;
            border-radius: 18px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }
        
        .skeleton-card::after {
            content: "";
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            transform: translateX(-100%);
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 1.6s infinite;
        }

        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        /* DATA CARDS */
        .meet-card {
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s ease;
        }
        .meet-card:hover { transform: scale(1.01); }
        .meet-info h3 { margin: 0; font-size: 20px; font-weight: 600; }
        .meet-info p { margin: 4px 0 0; color: var(--apple-gray); font-size: 14px; }

        /* BUTTONS */
        .cta-group { display: flex; gap: 20px; justify-content: center; }
        .btn-apple { background-color: var(--apple-blue); color: white; padding: 18px 32px; font-size: 19px; font-weight: 600; border-radius: 980px; text-decoration: none; transition: all 0.2s; }
        .btn-apple:hover { opacity: 0.9; transform: scale(1.02); }

        footer { padding: 60px 0; font-size: 14px; color: var(--apple-gray); text-align: center; }

        @media (max-width: 734px) { h1 { font-size: 48px; } .hero-lead { font-size: 24px; } }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <header class="hero">
            <img src="/images/a.png" alt="Gymetra Logo">
            <h1>This is Gymetra.</h1>
            <p class="hero-lead">Professional gymnastics scoring for everyone.</p>
            <div class="cta-group">
                <a href="/meets/" class="btn-apple">View Live Meets</a>
            </div>
        </header>

        <section class="meets-container">
            <h2 style="font-size: 24px; margin-bottom: 30px;">Active Events</h2>
            
            <div id="meets-list">
                <!-- SKELETON ROWS (Se borran al cargar) -->
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </section>
    </div>

    <footer>
        Copyright &copy; 2026 Gymetra Studio. All rights reserved.
    </footer>

    <script>
        // Configuración de Supabase (Lectura Pública)
        const SB_URL = "https://ulexxpaatpjtpgkancew.supabase.co/rest/v1/meets";
        const SB_KEY = "TU_ANON_KEY_AQUI"; // Usa la 'anon public' key para la web principal

        async function fetchMeets() {
            try {
                const response = await fetch(`${SB_URL}?select=slug`, {
                    headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
                });
                const data = await response.json();
                renderMeets(data);
            } catch (error) {
                console.error("Error fetching meets:", error);
                document.getElementById('meets-list').innerHTML = "<p>Unable to load events.</p>";
            }
        }

        function renderMeets(meets) {
            const list = document.getElementById('meets-list');
            list.innerHTML = ""; // Borra los skeletons

            if (meets.length === 0) {
                list.innerHTML = "<p style='color: #86868b;'>No active events at the moment.</p>";
                return;
            }

            meets.forEach(meet => {
                const card = document.createElement('div');
                card.className = 'meet-card';
                card.innerHTML = `
                    <div class="meet-info">
                        <h3>${meet.slug.toUpperCase()}</h3>
                        <p>Live Competition</p>
                    </div>
                    <a href="/meets/view.html?slug=${meet.slug}" class="btn-apple" style="padding: 10px 20px; font-size: 14px;">View Results</a>
                `;
                list.appendChild(card);
            });
        }

        // Simular carga o ejecutar directamente
        window.onload = () => {
            // Un pequeño delay de 800ms para que se aprecie el Skeleton si la conexión es muy rápida
            setTimeout(fetchMeets, 800);
        };
    </script>
</body>
</html>
